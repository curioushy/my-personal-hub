<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// GF(256) Arithmetic — primitive polynomial 0x11D, generator α=2 (§4.1)
// ═══════════════════════════════════════════════════════════════════════════
const PRIM = 0x11D;
const gfExp = new Uint8Array(512);
const gfLog = new Uint8Array(256);
{
  let x = 1;
  for (let i = 0; i < 255; i++) {
    gfExp[i] = x;
    gfLog[x] = i;
    x <<= 1;
    if (x & 0x100) x ^= PRIM;
    x &= 0xFF;
  }
  for (let i = 255; i < 512; i++) gfExp[i] = gfExp[i - 255];
}

function gfMul(a, b) {
  if (a === 0 || b === 0) return 0;
  return gfExp[(gfLog[a] + gfLog[b]) % 255];
}
function gfInv(a) { return gfExp[255 - gfLog[a]]; }

// ═══════════════════════════════════════════════════════════════════════════
// Reed-Solomon Decoder — Berlekamp-Massey + Chien + Forney (§4.3)
// Fixed: Xi power derivation and formal derivative evaluation
// ═══════════════════════════════════════════════════════════════════════════
function rsDecode(data, nsym) {
  const n = data.length, k = n - nsym;

  // 1. Syndromes: S[j] = R(α^j) using Horner (big-endian polynomial)
  //    R(x) = data[0]*x^{n-1} + data[1]*x^{n-2} + ... + data[n-1]
  const syn = new Array(nsym);
  let allZero = true;
  for (let j = 0; j < nsym; j++) {
    let s = 0;
    for (let i = 0; i < n; i++) s = gfMul(s, gfExp[j]) ^ data[i];
    syn[j] = s;
    if (s !== 0) allZero = false;
  }
  if (allZero) return data.slice(0, k);

  // 2. Berlekamp-Massey → error locator Λ(x)
  let C = [1], B = [1], L = 0, m = 1, b = 1;
  for (let step = 0; step < nsym; step++) {
    let d = syn[step];
    for (let i = 1; i <= L && i < C.length; i++)
      d ^= gfMul(C[i], syn[step - i]);
    if (d === 0) { m++; continue; }
    const T = C.slice();
    const coef = gfMul(d, gfInv(b));
    const padB = new Array(m).fill(0).concat(B);
    while (C.length < padB.length) C.push(0);
    for (let i = 0; i < padB.length; i++) C[i] ^= gfMul(coef, padB[i]);
    if (2 * L <= step) { L = step + 1 - L; B = T; b = d; m = 1; }
    else { m++; }
  }

  // 3. Chien search: find roots of Λ(x)
  //    We evaluate Λ(α^{255-i}) for i=0..n-1.
  //    If zero, error at array pos = n-1-i, and the error locator X = α^i
  //    (because array pos p corresponds to polynomial power n-1-p)
  const errInfo = []; // {pos: array index, power: i such that X=α^i}
  for (let i = 0; i < n; i++) {
    let val = 0;
    for (let j = 0; j < C.length; j++)
      val ^= gfMul(C[j], gfExp[(j * (255 - i)) % 255]);
    if (val === 0) errInfo.push({ pos: n - 1 - i, power: i });
  }
  if (errInfo.length !== L) return null;

  // 4. Error evaluator Ω(x) = S(x)·Λ(x) mod x^nsym
  const omLen = Math.min(nsym, syn.length + C.length - 1);
  const omega = new Array(omLen).fill(0);
  for (let i = 0; i < nsym; i++)
    for (let j = 0; j < C.length && i + j < omLen; j++)
      omega[i + j] ^= gfMul(syn[i], C[j]);

  // 5. Forney: compute error magnitudes and correct
  const corrected = data.slice();
  for (const { pos, power } of errInfo) {
    // X = α^power is the error locator for this position
    const Xi = gfExp[power];
    const XiInv = gfExp[255 - power]; // α^{-power}

    // Ω(XiInv) via Horner
    let omVal = 0;
    for (let j = omega.length - 1; j >= 0; j--)
      omVal = gfMul(omVal, XiInv) ^ omega[j];

    // Λ'(XiInv) — formal derivative of Λ evaluated at XiInv
    // Λ(x) = C[0] + C[1]*x + C[2]*x^2 + ...
    // Λ'(x) = C[1] + C[3]*x^2 + C[5]*x^4 + ... (in GF(2^m), even multipliers vanish)
    // So Λ'(XiInv) = C[1]*XiInv^0 + C[3]*XiInv^2 + C[5]*XiInv^4 + ...
    let ld = 0;
    let xiPow = 1; // tracks XiInv^0, XiInv^2, XiInv^4, ...
    const xiSq = gfMul(XiInv, XiInv);
    for (let j = 1; j < C.length; j += 2) {
      ld ^= gfMul(C[j], xiPow);
      xiPow = gfMul(xiPow, xiSq);
    }
    if (ld === 0) return null;

    // Error magnitude: e = X * Ω(X⁻¹) / Λ'(X⁻¹)
    corrected[pos] ^= gfMul(gfMul(Xi, omVal), gfInv(ld));
  }
  return corrected.slice(0, k);
}

// ═══════════════════════════════════════════════════════════════════════════
// xorshift32 PRNG (§3.3)
// ═══════════════════════════════════════════════════════════════════════════
function xorshift32(state) {
  if (state === 0) state = 1;
  state ^= (state << 13);  state = state >>> 0;
  state ^= (state >>> 17);
  state ^= (state << 5);   state = state >>> 0;
  return state;
}

// ═══════════════════════════════════════════════════════════════════════════
// Robust Soliton CDF (§3.4) — c=0.1, delta=0.5
// ═══════════════════════════════════════════════════════════════════════════
function robustSolitonCdf(K) {
  const c = 0.1, delta = 0.5;
  if (K <= 1) return [{ degree: 1, cum: 1.0 }];

  const rho = new Float64Array(K + 1);
  rho[1] = 1.0 / K;
  for (let i = 2; i <= K; i++) rho[i] = 1.0 / (i * (i - 1));

  let S = c * Math.log(K / delta) * Math.sqrt(K);
  S = Math.max(S, 1.0);
  const pivot = Math.max(1, Math.round(K / S));

  const tau = new Float64Array(K + 1);
  for (let i = 1; i < pivot && i <= K; i++) tau[i] = S / (i * K);
  if (pivot <= K) tau[pivot] = S * Math.log(S / delta) / K;

  let total = 0;
  for (let i = 1; i <= K; i++) total += rho[i] + tau[i];

  const cdf = [];
  let cum = 0;
  for (let d = 1; d <= K; d++) {
    const prob = (rho[d] + tau[d]) / total;
    if (prob > 1e-10) { cum += prob; cdf.push({ degree: d, cum: Math.min(cum, 1.0) }); }
  }
  if (cdf.length > 0) cdf[cdf.length - 1].cum = 1.0;
  return cdf;
}

// ═══════════════════════════════════════════════════════════════════════════
// LT Symbol Selection — recompute which blocks a symbol covers (§3.5/3.6)
// ═══════════════════════════════════════════════════════════════════════════
function recomputeSelection(i, K, cdf) {
  // Degree — use Math.imul for 32-bit multiply (§13)
  let state = xorshift32((Math.imul(i + 1, 2654435761)) >>> 0);
  const r = state / 0xFFFFFFFF;
  let degree = 1;
  for (const entry of cdf) {
    if (r <= entry.cum) { degree = entry.degree; break; }
  }
  degree = Math.min(degree, K);

  // Block selection
  let seed = ((Math.imul(i + 1, 1103515245) + 12345) >>> 0);
  if (seed === 0) seed = 1;
  const selected = new Set();
  let st = seed, attempts = 0;
  while (selected.size < degree && attempts < degree * 10) {
    st = xorshift32(st);
    selected.add(st % K);
    attempts++;
  }
  return Array.from(selected);
}

// ═══════════════════════════════════════════════════════════════════════════
// LT Fountain Decoder — queue-based peeling (§3.6)
// ═══════════════════════════════════════════════════════════════════════════
class FountainDecoder {
  constructor(K, blockSize) {
    this.K = K;
    this.bs = blockSize;
    this.decoded = new Array(K).fill(null);
    this.decodedCount = 0;
    this.symbols = [];      // { data: Uint8Array, blocks: Set }
    this.cdf = null;
    this.seenIdx = new Set();
    // For each block index, track which symbols reference it
    this.blockToSymbols = new Array(K);
    for (let i = 0; i < K; i++) this.blockToSymbols[i] = [];
  }

  setCdf(cdf) { this.cdf = cdf; }

  addSymbol(symbolIndex, data) {
    if (this.decodedCount === this.K) return;
    if (this.seenIdx.has(symbolIndex)) return;  // ignore duplicates (§6.10)
    this.seenIdx.add(symbolIndex);

    const blocks = new Set(recomputeSelection(symbolIndex, this.K, this.cdf));
    const sym = { data: new Uint8Array(data), blocks };
    const symIdx = this.symbols.length;
    this.symbols.push(sym);

    // XOR out any already-decoded blocks and reduce
    for (const b of [...blocks]) {
      if (this.decoded[b] !== null) {
        for (let j = 0; j < this.bs; j++) sym.data[j] ^= this.decoded[b][j];
        sym.blocks.delete(b);
      } else {
        this.blockToSymbols[b].push(symIdx);
      }
    }

    // If reduced to degree 1, start peeling
    if (sym.blocks.size === 1) this._peel(symIdx);
  }

  _peel(startSymIdx) {
    const queue = [startSymIdx];
    while (queue.length > 0) {
      const si = queue.shift();
      const sym = this.symbols[si];
      if (sym.blocks.size !== 1) continue;

      const blockIdx = sym.blocks.values().next().value;
      if (this.decoded[blockIdx] !== null) continue;

      // Decode this block
      this.decoded[blockIdx] = new Uint8Array(sym.data);
      this.decodedCount++;

      // Reduce all other symbols referencing this block
      for (const otherIdx of this.blockToSymbols[blockIdx]) {
        if (otherIdx === si) continue;
        const other = this.symbols[otherIdx];
        if (!other.blocks.has(blockIdx)) continue;
        for (let j = 0; j < this.bs; j++) other.data[j] ^= this.decoded[blockIdx][j];
        other.blocks.delete(blockIdx);
        if (other.blocks.size === 1) queue.push(otherIdx);
      }
      this.blockToSymbols[blockIdx] = [];  // no longer needed
    }
  }

  isComplete() { return this.decodedCount === this.K; }
  progress() { return this.K > 0 ? this.decodedCount / this.K : 0; }

  reconstruct() {
    if (!this.isComplete()) return null;
    const out = new Uint8Array(this.K * this.bs);
    for (let i = 0; i < this.K; i++) out.set(this.decoded[i], i * this.bs);
    return out;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// RGB → HSV (§6.5)
// ═══════════════════════════════════════════════════════════════════════════
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
  const v = max, s = max === 0 ? 0 : d / max;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = 60 * (((g - b) / d) % 6);
    else if (max === g) h = 60 * ((b - r) / d + 2);
    else h = 60 * ((r - g) / d + 4);
  }
  if (h < 0) h += 360;
  return [h, s * 100, v * 100];
}

// ═══════════════════════════════════════════════════════════════════════════
// Color Classification — nearest-neighbor in RGB (§6.9)
// ═══════════════════════════════════════════════════════════════════════════
function classifyColor(r, g, b) {
  const d0 = r * r + g * g + b * b;
  const d1 = (r - 255) * (r - 255) + g * g + b * b;
  const d2 = r * r + (g - 255) * (g - 255) + b * b;
  const d3 = r * r + g * g + (b - 255) * (b - 255);
  if (d0 <= d1 && d0 <= d2 && d0 <= d3) return 0;
  if (d1 <= d2 && d1 <= d3) return 1;
  if (d2 <= d3) return 2;
  return 3;
}

// ═══════════════════════════════════════════════════════════════════════════
// Grid helpers — must match encoder exactly (§2.3)
// ═══════════════════════════════════════════════════════════════════════════
function isMarker(row, col, N) {
  const ms = 3;
  if (row < ms && col < ms) return 'TL';
  if (row < ms && col >= N - ms) return 'TR';
  if (row >= N - ms && col < ms) return 'BL';
  if (row >= N - ms && col >= N - ms) return 'BR';
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
// 3-Point Affine Transform (replaces 4-point homography)
// Only needs TL, TR, BL — no white BR marker required.
// Handles rotation, scale, translation, shear. No perspective (close enough
// for a phone roughly facing a screen).
// ═══════════════════════════════════════════════════════════════════════════
function computeAffine(src, dst) {
  // src/dst are arrays of 3 points: [TL, TR, BL]
  // Solves: dst = A * src (affine)
  // Returns {a,b,tx,c,d,ty} such that:
  //   x' = a*x + b*y + tx
  //   y' = c*x + d*y + ty
  const [x1,y1] = src[0], [x2,y2] = src[1], [x3,y3] = src[2];
  const [u1,v1] = dst[0], [u2,v2] = dst[1], [u3,v3] = dst[2];

  // Solve two 3x3 systems via Cramer's rule
  const det = x1*(y2-y3) - y1*(x2-x3) + (x2*y3 - x3*y2);
  if (Math.abs(det) < 1e-10) return null;
  const id = 1 / det;

  const a  = (u1*(y2-y3) - y1*(u2-u3) + (u2*y3-u3*y2)) * id;
  const b  = (x1*(u2-u3) - u1*(x2-x3) + (x2*u3-x3*u2)) * id;
  const tx = (x1*(y2*u3-y3*u2) - y1*(x2*u3-x3*u2) + u1*(x2*y3-x3*y2)) * id;

  const c  = (v1*(y2-y3) - y1*(v2-v3) + (v2*y3-v3*y2)) * id;
  const d  = (x1*(v2-v3) - v1*(x2-x3) + (x2*v3-x3*v2)) * id;
  const ty = (x1*(y2*v3-y3*v2) - y1*(x2*v3-x3*v2) + v1*(x2*y3-x3*y2)) * id;

  return {a,b,tx,c,d,ty};
}

function invertAffine(T) {
  // Inverse of affine: A^-1
  const det = T.a * T.d - T.b * T.c;
  if (Math.abs(det) < 1e-10) return null;
  const id = 1 / det;
  return {
    a:   T.d * id,
    b:  -T.b * id,
    tx: (T.b * T.ty - T.d * T.tx) * id,
    c:  -T.c * id,
    d:   T.a * id,
    ty: (T.c * T.tx - T.a * T.ty) * id,
  };
}

function applyAffine(T, x, y) {
  return [T.a * x + T.b * y + T.tx, T.c * x + T.d * y + T.ty];
}

// ═══════════════════════════════════════════════════════════════════════════
// Corner Marker Detection — full frame scan (§6.5)
// ═══════════════════════════════════════════════════════════════════════════
function detectMarkers(d, w, h) {
  const buckets = { TL: [], TR: [], BL: [] };
  const step = 3;

  // ── Quadrant constraint ──
  // Search each marker only in its expected 2/3-corner of the frame.
  // Eliminates ~75% of each frame as a source of false positives.
  // 65%/35% splits with generous central overlap for off-centre grids.
  const xR = Math.round(w * 0.65), xL = Math.round(w * 0.35);
  const yB = Math.round(h * 0.65), yT = Math.round(h * 0.35);
  const ranges = { TL:[0,xR,0,yB], TR:[xL,w,0,yB], BL:[0,xR,yT,h] };

  for (const key of ['TL','TR','BL']) {
    const [x0,x1,y0,y1] = ranges[key];
    for (let y = Math.max(step,y0); y < Math.min(h-step,y1); y += step) {
      for (let x = Math.max(step,x0); x < Math.min(w-step,x1); x += step) {
        const i = (y*w+x)*4;
        const r=d[i], g=d[i+1], b=d[i+2];
        const mx = Math.max(r,g,b);
        if (mx < 35) continue;

        // Ratio-based 2-channel detection
        const hiT=mx*0.60, loT=mx*0.32;
        let ok = false;
        if      (key==='TL' && g>=hiT && b>=hiT && r<loT) ok=true;
        else if (key==='TR' && r>=hiT && b>=hiT && g<loT) ok=true;
        else if (key==='BL' && r>=hiT && g>=hiT && b<loT) ok=true;
        if (!ok) continue;

        // ── Neighbour verification ──
        // Require ≥ 2 of 4 axis-aligned step-neighbours to also match.
        // A single isolated blending pixel has 0-1 matching neighbours → gone.
        // The quadrant constraint already eliminates most false positives,
        // so ≥2 is enough. Using ≥3 caused too many misses on blurry frames.
        let nn = 0;
        for (const [dx,dy] of [[step,0],[-step,0],[0,step],[0,-step]]) {
          const nx=x+dx, ny=y+dy;
          if (nx<0||nx>=w||ny<0||ny>=h) continue;
          const ni=(ny*w+nx)*4;
          const nr=d[ni], ng=d[ni+1], nb_=d[ni+2];
          const nmx=Math.max(nr,ng,nb_);
          if (nmx<35) continue;
          const nhiT=nmx*0.60, nloT=nmx*0.32;
          if      (key==='TL'&&ng>=nhiT&&nb_>=nhiT&&nr<nloT) nn++;
          else if (key==='TR'&&nr>=nhiT&&nb_>=nhiT&&ng<nloT) nn++;
          else if (key==='BL'&&nr>=nhiT&&ng>=nhiT&&nb_<nloT) nn++;
        }
        if (nn >= 2) buckets[key].push([x, y]);
      }
    }
  }

  // ── Density-based clustering ──
  // After neighbour filtering, surviving pixels are almost exclusively from
  // the actual marker block — far fewer but far more reliable.
  function densestCluster(pts) {
    if (pts.length < 3) return null;
    const BINS = 12;
    const bw=w/BINS, bh=h/BINS;
    const counts = new Int32Array(BINS*BINS);
    for (const [px,py] of pts) {
      counts[Math.min(BINS-1,Math.floor(py/bh))*BINS + Math.min(BINS-1,Math.floor(px/bw))]++;
    }
    let best=0, bbx=0, bby=0;
    for (let by=0;by<BINS;by++) for (let bx=0;bx<BINS;bx++) {
      let sum=0;
      for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
        const nx=bx+dx, ny=by+dy;
        if (nx>=0&&nx<BINS&&ny>=0&&ny<BINS) sum+=counts[ny*BINS+nx];
      }
      if (sum>best) { best=sum; bbx=bx; bby=by; }
    }
    if (best < 3) return null;
    let sx=0, sy=0, cnt=0;
    for (const [px,py] of pts) {
      const bx=Math.min(BINS-1,Math.floor(px/bw)), by=Math.min(BINS-1,Math.floor(py/bh));
      if (Math.abs(bx-bbx)<=1 && Math.abs(by-bby)<=1) { sx+=px; sy+=py; cnt++; }
    }
    return cnt >= 2 ? [sx/cnt, sy/cnt] : null;
  }

  const result = {};
  for (const key of ['TL','TR','BL']) result[key] = densestCluster(buckets[key]);

  if (result.TL && result.TR && result.BL) {
    const [tlx,tly]=result.TL, [trx]=result.TR, [,bly]=result.BL;
    if (tlx>trx+10 || tly>bly+10) return { pts:{}, counts:{} };
  }

  return {
    pts: result,
    counts: { TL:buckets.TL.length, TR:buckets.TR.length, BL:buckets.BL.length }
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// Temporal Smoothing — stabilize marker positions across frames
// ═══════════════════════════════════════════════════════════════════════════
const smoothedMarkers = { TL: null, TR: null, BL: null };
const markerMiss = { TL: 0, TR: 0, BL: 0 };  // consecutive-miss counter
const MAX_MISS = 15;  // ~1s at 15fps before a stale position is dropped
const SMOOTH_ALPHA = 0.45; // faster convergence to new position

function smoothMarkers(raw) {
  const result = {};
  for (const key of ['TL', 'TR', 'BL']) {
    if (!raw[key]) {
      markerMiss[key]++;
      if (markerMiss[key] >= MAX_MISS) {
        // Too many misses in a row — position is stale, discard it
        smoothedMarkers[key] = null;
      }
      // Keep the last known position until it expires
      if (smoothedMarkers[key]) result[key] = smoothedMarkers[key];
    } else {
      markerMiss[key] = 0;
      if (!smoothedMarkers[key]) {
        smoothedMarkers[key] = raw[key].slice();
      } else {
        const [ox, oy] = smoothedMarkers[key];
        const [nx, ny] = raw[key];
        const sx = ox + SMOOTH_ALPHA * (nx - ox);
        const sy = oy + SMOOTH_ALPHA * (ny - oy);
        smoothedMarkers[key] = [sx, sy];
      }
      result[key] = smoothedMarkers[key];
    }
  }
  return result;
}

function resetSmoothing() {
  for (const key of ['TL','TR','BL']) {
    smoothedMarkers[key] = null;
    markerMiss[key] = 0;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Sample a 3×3 patch around (cx,cy) from ImageData (§6.7)
// ═══════════════════════════════════════════════════════════════════════════
function samplePatch(d, w, h, cx, cy) {
  let sr = 0, sg = 0, sb = 0, cnt = 0;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const px = Math.round(cx + dx), py = Math.round(cy + dy);
      if (px >= 0 && px < w && py >= 0 && py < h) {
        const i = (py * w + px) * 4;
        sr += d[i]; sg += d[i + 1]; sb += d[i + 2]; cnt++;
      }
    }
  }
  return cnt > 0 ? [sr / cnt, sg / cnt, sb / cnt] : [0, 0, 0];
}

// ═══════════════════════════════════════════════════════════════════════════
// Frame Decoding: unpack cells → RS decode → parse header
// ═══════════════════════════════════════════════════════════════════════════
function decodeFrame(cellValues, rsParams, numColors = 4) {
  // Pack cell values → bytes (4 cells/byte for 4-color, 8 cells/byte for 2-color)
  const cpp = numColors === 2 ? 8 : 4;
  const nBytes = Math.floor(cellValues.length / cpp);
  const raw = new Uint8Array(nBytes);
  if (numColors === 2) {
    for (let i = 0; i < nBytes; i++) {
      raw[i] = ((cellValues[i*8]   & 1) << 7) | ((cellValues[i*8+1] & 1) << 6) |
               ((cellValues[i*8+2] & 1) << 5) | ((cellValues[i*8+3] & 1) << 4) |
               ((cellValues[i*8+4] & 1) << 3) | ((cellValues[i*8+5] & 1) << 2) |
               ((cellValues[i*8+6] & 1) << 1) |  (cellValues[i*8+7] & 1);
    }
  } else {
    for (let i = 0; i < nBytes; i++) {
      raw[i] = ((cellValues[i * 4] & 3) << 6) |
               ((cellValues[i * 4 + 1] & 3) << 4) |
               ((cellValues[i * 4 + 2] & 3) << 2) |
                (cellValues[i * 4 + 3] & 3);
    }
  }

  // RS decode each block
  const { nBlocks, totalPer, eccPer, dataPer } = rsParams;
  let rsData = new Uint8Array(0);
  for (let b = 0; b < nBlocks; b++) {
    const block = raw.slice(b * totalPer, (b + 1) * totalPer);
    const decoded = rsDecode(block, eccPer);
    if (!decoded) return null;
    const merged = new Uint8Array(rsData.length + decoded.length);
    merged.set(rsData); merged.set(decoded, rsData.length);
    rsData = merged;
  }

  if (rsData.length < 4) return null;
  return {
    type:  rsData[0],
    index: (rsData[1] << 16) | (rsData[2] << 8) | rsData[3],
    payload: rsData.slice(4),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// Parse Config Payload (§2.8)
// ═══════════════════════════════════════════════════════════════════════════
function parseConfig(p) {
  if (p.length < 46) return null;
  const dv = new DataView(p.buffer, p.byteOffset, p.byteLength);
  const c = {
    grid_size:   p[0],
    num_colors:  p[1],
    fps:         p[2],
    ecc_percent: p[3],
    file_size:   dv.getUint32(4, false),
    K:           dv.getUint16(8, false),
    block_size:  dv.getUint16(10, false),
    sha256:      Array.from(p.slice(12, 44)).map(b => b.toString(16).padStart(2, '0')).join(''),
    flags:       p[44],
    filename_len: p[45],
    filename:    '',
  };

  // Validate — reject garbage configs (e.g. all-zero frames that pass RS)
  if (c.grid_size < 8 || c.grid_size > 64) return null;
  if (c.num_colors !== 4 && c.num_colors !== 2) return null;
  if (c.K === 0 || c.block_size === 0) return null;
  if (c.file_size === 0) return null;
  if (c.fps === 0 || c.fps > 60) return null;
  if (c.ecc_percent === 0 || c.ecc_percent > 90) return null;
  // SHA-256 should not be all zeros
  if (c.sha256 === '0'.repeat(64)) return null;

  c.is_compressed = !!(c.flags & 0x01);
  if (c.filename_len > 0 && p.length >= 46 + c.filename_len)
    c.filename = new TextDecoder().decode(p.slice(46, 46 + c.filename_len));

  // Derive RS parameters (cells-per-byte differs by colour mode)
  const dataCells = c.grid_size * c.grid_size - 36;
  const frameBytes = Math.floor(dataCells / (c.num_colors === 2 ? 8 : 4));
  const eccBytes = Math.max(2, Math.floor(frameBytes * c.ecc_percent / 100));
  if (frameBytes <= 255) {
    c.rs = { nBlocks: 1, totalPer: frameBytes, eccPer: eccBytes, dataPer: frameBytes - eccBytes };
  } else {
    const nb = Math.ceil(frameBytes / 255);
    c.rs = { nBlocks: nb, totalPer: Math.floor(frameBytes / nb),
             eccPer: Math.floor(eccBytes / nb),
             dataPer: Math.floor(frameBytes / nb) - Math.floor(eccBytes / nb) };
  }
  return c;
}

// ═══════════════════════════════════════════════════════════════════════════
// SHA-256 via Web Crypto (§8.1)
// ═══════════════════════════════════════════════════════════════════════════
async function sha256hex(data) {
  const h = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
// State Machine (§7)
// ═══════════════════════════════════════════════════════════════════════════
const S = { SEARCHING: 0, DECODING: 1, VERIFYING: 2, COMPLETE: 3, RETRY: 4 };
let state = S.SEARCHING;
let cfg = null;
let decoder = null;
let downloadData = null;
let downloadFilename = 'file';

// Stats
let rsOk = 0, rsFail = 0, t0 = 0;
let totalFramesCaptured = 0;
let lastConfigHash = null; // track transmitter file changes

// DOM
const vid     = document.getElementById('vid');
const pcv     = document.getElementById('pcv');
const pctx    = pcv.getContext('2d', { willReadFrequently: true });
const ovl     = document.getElementById('overlay');
const octx    = ovl.getContext('2d');
const elStatus = document.getElementById('status');
const elSub    = document.getElementById('sub');
const elProg   = document.getElementById('prog');
const elStats  = document.getElementById('stats');
const elErr    = document.getElementById('err');
const elFinfo  = document.getElementById('finfo');
const elDetail = document.getElementById('detail-box');
const btnDl    = document.getElementById('btn-dl');
const btnResume = document.getElementById('btn-resume');
const btnRestart = document.getElementById('btn-restart');
const btnReset = document.getElementById('btn-reset');
const btnLog   = document.getElementById('btn-log');

function fmtB(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

// ─── Diagnostic Log ───────────────────────────────────────────────────────
const diagLog = [];
const MAX_LOG = 5000;
const sessionStart = Date.now();

function dlog(type, msg, extra) {
  const ts = ((Date.now() - sessionStart) / 1000).toFixed(2);
  diagLog.push({ t: ts, type, msg, extra: extra || null });
  if (diagLog.length > MAX_LOG) diagLog.shift();
  btnLog.style.display = 'inline-block';
}

// ─── Audio Feedback ───────────────────────────────────────────────────────
let audioCtx = null;
let lastBeepMs = 0;
function beep(freq = 880, dur = 0.05, vol = 0.12) {
  const now = Date.now();
  if (now - lastBeepMs < 150) return; // max ~6 beeps/sec
  lastBeepMs = now;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch (e) { /* audio unavailable */ }
}

function updateUI() {
  // Reset button visible whenever camera is active
  btnReset.style.display = (state !== S.SEARCHING || rsOk + rsFail > 0) ? 'inline-block' : 'none';

  if (state === S.SEARCHING) {
    document.body.style.backgroundColor = '#222';
    elStatus.textContent = 'SEARCHING';
    elSub.textContent = 'Point camera at transmitter screen';
    elDetail.style.display = 'none';
    return;
  }
  if (state === S.DECODING && cfg && decoder) {
    const pct = Math.round(decoder.progress() * 100);
    elProg.style.width = pct + '%';
    elStatus.textContent = 'RECEIVING ' + pct + '%';
    elSub.textContent = cfg.filename + ' — ' + fmtB(cfg.file_size);

    const elapsed = (Date.now() - t0) / 1000;
    const quality = rsOk + rsFail > 0 ? Math.round(rsOk / (rsOk + rsFail) * 100) : 0;
    const uniqueSymbols = decoder.seenIdx.size;
    const bytesDecoded = decoder.decodedCount * cfg.block_size;
    const totalBytes = cfg.K * cfg.block_size;
    const dataRate = elapsed > 0 ? bytesDecoded / elapsed : 0;
    const remaining = dataRate > 0 ? Math.max(0, (totalBytes - bytesDecoded) / dataRate) : 0;

    elStats.textContent =
      `Blocks: ${decoder.decodedCount}/${cfg.K} (${pct}%) | Signal: ${quality}% | ${elapsed.toFixed(0)}s`;

    // Detailed stats box
    elDetail.style.display = 'block';
    elDetail.innerHTML =
      `<div class="row"><span class="label">File</span><span class="val">${cfg.filename}</span></div>` +
      `<div class="row"><span class="label">Original size</span><span class="val">${fmtB(cfg.file_size)}</span></div>` +
      `<div class="row"><span class="label">Data received</span><span class="val">${fmtB(bytesDecoded)} / ${fmtB(totalBytes)}</span></div>` +
      `<div class="row"><span class="label">Unique symbols</span><span class="val">${uniqueSymbols} / ${cfg.K} needed</span></div>` +
      `<div class="row"><span class="label">Frames captured</span><span class="val">${totalFramesCaptured} (OK: ${rsOk}, Fail: ${rsFail})</span></div>` +
      `<div class="row"><span class="label">Data rate</span><span class="val">${fmtB(Math.round(dataRate))}/s</span></div>` +
      `<div class="row"><span class="label">Est. remaining</span><span class="val">${remaining < 999 ? remaining.toFixed(0) + 's' : '...'}</span></div>` +
      `<div class="row"><span class="label">SHA-256</span><span class="val" style="font-size:.85em">${cfg.sha256.slice(0,16)}...</span></div>`;

    // Background: red→yellow→green transition
    const gv = Math.floor(pct * 1.5);
    const rv = Math.floor((100 - pct) * 0.6);
    document.body.style.backgroundColor = `rgb(${rv},${Math.floor(gv * 0.35)},0)`;
    btnReset.style.display = 'inline-block';
    return;
  }
  if (state === S.VERIFYING) {
    elStatus.textContent = 'VERIFYING...';
    elSub.textContent = 'Checking SHA-256';
    return;
  }
  if (state === S.COMPLETE) {
    document.body.style.backgroundColor = '#1a4a1a';
    elProg.style.width = '100%';
    elStatus.textContent = '\u2713 COMPLETE';
    elSub.textContent = 'Transfer successful!';
    elFinfo.textContent = cfg.filename + ' — ' + fmtB(downloadData.length);
    btnDl.style.display = 'inline-block';
    btnReset.style.display = 'inline-block';
    document.getElementById('debug-canvas').style.display = 'none';
    document.getElementById('debug-info').textContent = '';
    return;
  }
  if (state === S.RETRY) {
    document.body.style.backgroundColor = '#3a1a1a';
    elStatus.textContent = '\u26A0 VERIFY FAILED';
    btnResume.style.display = 'inline-block';
    btnRestart.style.display = 'inline-block';
    btnReset.style.display = 'inline-block';
    return;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Main Per-Frame Processing (§6.10)
// ═══════════════════════════════════════════════════════════════════════════
const CELL_PX = 20;

async function processFrame(imgData, w, h) {
  // 1. Detect markers (raw) then smooth
  const { pts: rawMarkers, counts: rawCounts } = detectMarkers(imgData.data, w, h);
  const markers = smoothMarkers(rawMarkers);
  // Only need 3 corners (TL, TR, BL) — white BR is dropped
  const found = ['TL','TR','BL'].filter(k => markers[k]);

  // Show debug info during search
  if (state === S.SEARCHING) {
    const missing = ['TL','TR','BL'].filter(k => !markers[k]);
    const cStr = `cy:${rawCounts.TL||0} mg:${rawCounts.TR||0} yw:${rawCounts.BL||0}`;
    elStats.textContent = `${found.length<3 ? 'Missing: '+missing.join(',') : 'ALL 3 FOUND'} | ${cStr} | ${w}x${h}`;
  }

  if (found.length < 3) {
    if (state === S.SEARCHING) updateUI();
    return;
  }

  const N = cfg ? cfg.grid_size : 24;

  // 2. Affine transform: camera → canonical grid (3 points, no BR needed)
  const srcPts = [markers.TL, markers.TR, markers.BL];
  const dstPts = [
    [1.5 * CELL_PX, 1.5 * CELL_PX],        // TL marker center
    [(N - 1.5) * CELL_PX, 1.5 * CELL_PX],   // TR marker center
    [1.5 * CELL_PX, (N - 1.5) * CELL_PX],   // BL marker center
  ];

  const A = computeAffine(srcPts, dstPts);
  if (!A) return;
  const Ai = invertAffine(A);
  if (!Ai) return;

  // 3. White balance: compute where BR marker SHOULD be via affine, sample there
  const brCanonical = [(N - 1.5) * CELL_PX, (N - 1.5) * CELL_PX];
  const [brCamX, brCamY] = applyAffine(Ai, brCanonical[0], brCanonical[1]);
  const [wr, wg, wb] = samplePatch(imgData.data, w, h, brCamX, brCamY);
  // Only apply white balance if the sample looks white-ish (low saturation)
  const wMax = Math.max(wr, wg, wb), wMin = Math.min(wr, wg, wb);
  const wSat = wMax > 0 ? (wMax - wMin) / wMax : 0;
  let corrR = 1, corrG = 1, corrB = 1;
  if (wSat < 0.3 && wMax > 80) {
    corrR = wr > 10 ? 255 / wr : 1;
    corrG = wg > 10 ? 255 / wg : 1;
    corrB = wb > 10 ? 255 / wb : 1;
  }

  // 4. Sample data cells using affine inverse
  // Build two cell arrays in one pass:
  //   cells4 — 4-color nearest-neighbour (black/red/green/blue)
  //   cells2 — 2-color luminance threshold (black/white), used in safe mode
  const cells4 = [], cells2 = [];
  for (let row = 0; row < N; row++) {
    for (let col = 0; col < N; col++) {
      if (isMarker(row, col, N)) continue;
      const cx = (col + 0.5) * CELL_PX;
      const cy = (row + 0.5) * CELL_PX;
      const [camX, camY] = applyAffine(Ai, cx, cy);
      let [r, g, b] = samplePatch(imgData.data, w, h, camX, camY);
      r = Math.min(255, r * corrR);
      g = Math.min(255, g * corrG);
      b = Math.min(255, b * corrB);
      cells4.push(classifyColor(r, g, b));
      cells2.push((r * 299 + g * 587 + b * 114) / 1000 > 127 ? 1 : 0);
    }
  }
  // Active cell array: use luminance classification when in 2-color mode
  const cells = (cfg && cfg.num_colors === 2) ? cells2 : cells4;

  // 5. Draw overlay — 3 detected corners + computed BR
  octx.clearRect(0, 0, ovl.width, ovl.height);
  const sx = ovl.width / w, sy = ovl.height / h;
  const clr = { TL: 'cyan', TR: 'magenta', BL: 'yellow' };
  for (const [k, [px, py]] of Object.entries(markers)) {
    if (!clr[k]) continue;
    const dx = px * sx, dy = py * sy;
    octx.beginPath(); octx.arc(dx, dy, 8, 0, Math.PI * 2);
    octx.strokeStyle = clr[k]; octx.lineWidth = 3; octx.stroke();
    octx.fillStyle = clr[k]; octx.font = 'bold 12px monospace';
    octx.fillText(k, dx + 10, dy - 4);
  }
  // Draw computed BR position (derived, not detected)
  octx.beginPath(); octx.arc(brCamX * sx, brCamY * sy, 6, 0, Math.PI * 2);
  octx.strokeStyle = 'rgba(255,255,255,0.5)'; octx.lineWidth = 2; octx.stroke();
  octx.fillStyle = 'rgba(255,255,255,0.6)'; octx.font = 'bold 10px monospace';
  octx.fillText('br', brCamX * sx + 8, brCamY * sy - 3);
  // Draw triangle from 3 corners + line to computed BR
  octx.beginPath();
  octx.moveTo(markers.TL[0]*sx, markers.TL[1]*sy);
  octx.lineTo(markers.TR[0]*sx, markers.TR[1]*sy);
  octx.lineTo(brCamX*sx, brCamY*sy);
  octx.lineTo(markers.BL[0]*sx, markers.BL[1]*sy);
  octx.closePath();
  octx.strokeStyle = 'rgba(100,255,100,0.5)'; octx.lineWidth = 2; octx.stroke();

  // === Draw debug grid — show what receiver "sees" ===
  const dbgCanvas = document.getElementById('debug-canvas');
  const dbgInfo = document.getElementById('debug-info');
  if (state === S.SEARCHING || state === S.DECODING) {
    dbgCanvas.style.display = 'block';
    const dbgSize = Math.min(200, Math.floor(window.innerWidth * 0.4));
    const dbgCellPx = Math.max(1, Math.floor(dbgSize / N));
    dbgCanvas.width = dbgCellPx * N; dbgCanvas.height = dbgCellPx * N;
    const dctx = dbgCanvas.getContext('2d');
    const PALETTE = (cfg && cfg.num_colors === 2)
      ? [[0,0,0],[255,255,255],[255,255,255],[255,255,255]]
      : [[0,0,0],[255,0,0],[0,255,0],[0,0,255]];
    const MK = {TL:[0,255,255],TR:[255,0,255],BL:[255,255,0],BR:[255,255,255]};
    let ci = 0;
    for (let row = 0; row < N; row++) {
      for (let col = 0; col < N; col++) {
        const m = isMarker(row, col, N);
        const [cr,cg,cb] = m ? MK[m] : PALETTE[ci < cells.length ? cells[ci] : 0];
        if (!m) ci++;
        dctx.fillStyle = `rgb(${cr},${cg},${cb})`;
        dctx.fillRect(col * dbgCellPx, row * dbgCellPx, dbgCellPx, dbgCellPx);
      }
    }
  }

  // === Color distribution for diagnostics (always from 4-color classifier) ===
  const colorDist = [0,0,0,0]; // black, red, green, blue
  for (const c of cells4) colorDist[c]++;
  const distStr = `B:${colorDist[0]} R:${colorDist[1]} G:${colorDist[2]} Bl:${colorDist[3]}`;

  // === Frame quality gate: skip RS decode if >70% black (motion blur / bad frame) ===
  if (colorDist[0] / cells.length > 0.70) {
    dlog('SKIP', 'Frame skipped: too many black cells', { pctBlack: Math.round(colorDist[0] / cells.length * 100), dist: distStr });
    return;
  }

  // === SEARCHING: need config first ===
  if (state === S.SEARCHING) {
    const dataCells = N * N - 36;
    const fb4 = Math.floor(dataCells / 4); // frameBytes for 4-color
    const fb2 = Math.floor(dataCells / 8); // frameBytes for 2-color (safe mode)
    // Probe 4-color at all ECC% values, plus 2-color at common safe-mode values.
    // 2-color uses luminance-classified cells2 so white is correctly decoded.
    const probes = [
      ...[20,25,30,35,40,15,45,10,50,5].map(e => ({ e, nc:4, fb:fb4 })),
      ...[50,40,30,20].map(e => ({ e, nc:2, fb:fb2 })),
    ];
    let result = null, usedEcc = 20, usedNc = 4;
    for (const { e: eccPct, nc, fb: frameBytes } of probes) {
      const eb = Math.max(2, Math.floor(frameBytes * eccPct / 100));
      if (eb >= frameBytes) continue;
      const rs = { nBlocks:1, totalPer:frameBytes, eccPer:eb, dataPer:frameBytes-eb };
      const r = decodeFrame(nc === 2 ? cells2 : cells4, rs, nc);
      if (r) { result = r; usedEcc = eccPct; usedNc = nc; break; }
    }
    const frameBytes = usedNc === 2 ? fb2 : fb4;
    const eccBytes = Math.max(2, Math.floor(frameBytes * usedEcc / 100));
    totalFramesCaptured++;
    if (!result) {
      rsFail++;
      const pctBlack = Math.round(colorDist[0] / cells.length * 100);
      const cStr = `cy:${rawCounts.TL||0} mg:${rawCounts.TR||0} yw:${rawCounts.BL||0}`;
      const rsMsg = `RS FAIL #${rsFail} | ${pctBlack}% blk`;
      elStats.textContent = `${found.length<3 ? 'Missing:'+['TL','TR','BL'].filter(k=>!markers[k]).join(',') : '3 FOUND'} | ${cStr} | ${rsMsg}`;
      dbgInfo.textContent = `${rsMsg} | ${distStr}`;
      if (rsFail <= 50 || rsFail % 25 === 0) dlog('RS_FAIL', rsMsg, { dist: distStr, markers: found.join(',') });
      return;
    }
    rsOk++;
    if (result.type === 0x00) {
      const parsed = parseConfig(result.payload);
      if (!parsed) {
        const raw = result.payload;
        const gs = raw[0], nc = raw[1], K = raw.length >= 10 ? (raw[8]<<8|raw[9]) : 0;
        const fs = raw.length >= 8 ? ((raw[4]<<24)|(raw[5]<<16)|(raw[6]<<8)|raw[7])>>>0 : 0;
        const msg = `Config rejected: grid=${gs} nc=${nc} K=${K} size=${fs}`;
        elStats.textContent = msg;
        dbgInfo.textContent = `${msg} | ${distStr}`;
        dlog('WARN', msg);
        return;
      }
      cfg = parsed;
      lastConfigHash = cfg.sha256;
      decoder = new FountainDecoder(cfg.K, cfg.block_size);
      decoder.setCdf(robustSolitonCdf(cfg.K));
      t0 = Date.now();
      downloadFilename = cfg.filename || 'file';
      state = S.DECODING;
      elStats.textContent = 'Config OK! Starting decode...';
      dbgInfo.textContent = 'Config OK! Decoding...';
      dlog('STATE', 'Config received — starting decode', { file: cfg.filename, size: cfg.file_size, K: cfg.K, grid: cfg.grid_size, ecc: cfg.ecc_percent });
      updateUI();

      // Lock camera (§6.4)
      try {
        const track = vid.srcObject.getVideoTracks()[0];
        const caps = track.getCapabilities();
        const adv = {};
        if (caps.exposureMode) adv.exposureMode = 'manual';
        if (caps.focusMode) adv.focusMode = 'manual';
        if (caps.whiteBalanceMode) adv.whiteBalanceMode = 'manual';
        if (Object.keys(adv).length) track.applyConstraints({ advanced: [adv] });
      } catch (e) { /* some devices don't support manual — OK */ }
    } else {
      const msg = `RS OK type=0x${result.type.toString(16)} (need 0x00) idx=${result.index}`;
      elStats.textContent = msg;
      dbgInfo.textContent = `${msg} | ${distStr}`;
    }
    return;
  }

  // === DECODING ===
  if (state !== S.DECODING) return;

  const result = decodeFrame(cells, cfg.rs, cfg.num_colors);
  if (!result) { rsFail++; updateUI(); return; }
  rsOk++;

  if (result.type === 0x00) {
    // Config frame during decoding — check if settings or file changed
    const newCfg = parseConfig(result.payload);
    if (newCfg) {
      const settingsChanged = newCfg.ecc_percent !== cfg.ecc_percent ||
                             newCfg.grid_size   !== cfg.grid_size;
      const fileChanged = newCfg.sha256 !== cfg.sha256;
      if (settingsChanged || fileChanged) {
        // Settings or file changed — restart automatically with new config
        const chgMsg = settingsChanged
          ? '\u26A0 Transmitter settings changed — restarting with new config...'
          : '\u26A0 Transmitter file changed — restarting...';
        elErr.textContent = chgMsg;
        dlog('STATE', chgMsg.replace('\u26A0 ', ''));
        // Re-initialise with new config immediately
        cfg = newCfg;
        lastConfigHash = cfg.sha256;
        decoder = new FountainDecoder(cfg.K, cfg.block_size);
        decoder.setCdf(robustSolitonCdf(cfg.K));
        rsOk = 0; rsFail = 0; t0 = Date.now();
        downloadFilename = cfg.filename || 'file';
        updateUI();
        setTimeout(() => { elErr.textContent = ''; }, 3000);
        return;
      }
    }
  } else if (result.type === 0x01) {
    const prevDecoded = decoder.decodedCount;
    decoder.addSymbol(result.index, result.payload.slice(0, cfg.block_size));
    totalFramesCaptured++;
    if (decoder.decodedCount > prevDecoded) beep();
    updateUI();

    // Log at 25% milestones
    const _pct = decoder.decodedCount / cfg.K;
    if ([0.25, 0.50, 0.75].some(m => prevDecoded < Math.floor(cfg.K * m) && decoder.decodedCount >= Math.floor(cfg.K * m))) {
      dlog('PROGRESS', `${Math.round(_pct * 100)}% decoded`, { blocks: decoder.decodedCount, K: cfg.K, rsOk, rsFail });
    }

    if (decoder.isComplete()) {
      state = S.VERIFYING;
      updateUI();
      await verifyAndFinish();
    }
  } else if (result.type === 0xFF && decoder.isComplete()) {
    state = S.VERIFYING;
    updateUI();
    await verifyAndFinish();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Verification and Download (§8.1)
// ═══════════════════════════════════════════════════════════════════════════
async function verifyAndFinish() {
  const raw = decoder.reconstruct();
  if (!raw) { state = S.DECODING; updateUI(); return; }

  const isCompressed = raw[0] === 0x01;
  let payload = raw.slice(1);
  let fileData;
  if (isCompressed) {
    try { fileData = pako.inflate(payload); }
    catch (e) {
      elErr.textContent = 'Decompression failed: ' + e.message;
      state = S.RETRY; updateUI(); return;
    }
  } else {
    fileData = payload.slice(0, cfg.file_size);
  }
  fileData = fileData.slice(0, cfg.file_size);

  const hash = await sha256hex(fileData);
  if (hash !== cfg.sha256) {
    const errMsg = 'SHA-256 mismatch. Keep transmitter running and tap Resume.';
    elErr.textContent = errMsg;
    dlog('ERROR', errMsg, { expected: cfg.sha256.slice(0, 16) + '...', got: hash.slice(0, 16) + '...' });
    state = S.RETRY; updateUI(); return;
  }

  // Success!
  downloadData = fileData;
  dlog('STATE', 'Transfer complete', { file: cfg.filename, size: downloadData.length, elapsed: ((Date.now() - t0) / 1000).toFixed(1) + 's', rsOk, rsFail });
  beep(1047, 0.18, 0.2); // higher pitch chord for completion
  state = S.COMPLETE;
  updateUI();
  elErr.textContent = '';

  // Stop camera
  if (vid.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
  if (captureTimer) { clearInterval(captureTimer); captureTimer = null; }
}

// ═══════════════════════════════════════════════════════════════════════════
// Camera + Capture Loop
// ═══════════════════════════════════════════════════════════════════════════
let captureTimer = null;

async function startCamera() {
  dlog('STATE', 'Camera starting');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
      audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    ovl.width = vid.clientWidth || 640;
    ovl.height = vid.clientHeight || 360;
    const track = stream.getVideoTracks()[0];
    const settings = track ? track.getSettings() : {};
    dlog('STATE', 'Camera ready', { w: settings.width, h: settings.height, fps: settings.frameRate });
    state = S.SEARCHING;
    btnReset.style.display = 'inline-block';
    updateUI();
    captureTimer = setInterval(captureAndProcess, 66); // ~15fps processing
  } catch (e) {
    const camErr = 'Camera error: ' + e.message + '. Ensure HTTPS is used.';
    elErr.textContent = camErr;
    dlog('ERROR', camErr);
  }
}

async function captureAndProcess() {
  if (state === S.COMPLETE || state === S.VERIFYING) return;
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if (!vw || !vh) return;

  // Downscale for performance
  const scale = Math.min(1, 640 / Math.max(vw, vh));
  const pw = Math.round(vw * scale), ph = Math.round(vh * scale);
  pcv.width = pw; pcv.height = ph;
  pctx.drawImage(vid, 0, 0, pw, ph);
  const imgData = pctx.getImageData(0, 0, pw, ph);
  ovl.width = vid.clientWidth || pw;
  ovl.height = vid.clientHeight || ph;

  try { await processFrame(imgData, pw, ph); } catch (e) { dlog('ERROR', 'processFrame exception: ' + e.message, { stack: e.stack ? e.stack.slice(0, 300) : null }); }
}

// ═══════════════════════════════════════════════════════════════════════════
// Button Handlers
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById('btn-start').onclick = async () => {
  document.getElementById('btn-start').style.display = 'none';
  await startCamera();
};

btnDl.onclick = () => {
  if (!downloadData) return;
  const blob = new Blob([downloadData]);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = downloadFilename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

btnResume.onclick = () => {
  // Keep accumulated symbols, resume decoding
  state = S.DECODING;
  elErr.textContent = '';
  btnResume.style.display = 'none';
  btnRestart.style.display = 'none';
  updateUI();
  if (!captureTimer) captureTimer = setInterval(captureAndProcess, 66);
};

function fullReset() {
  dlog('STATE', 'Full reset');
  cfg = null; decoder = null;
  rsOk = 0; rsFail = 0; totalFramesCaptured = 0;
  resetSmoothing();
  lastConfigHash = null;
  downloadData = null;
  elErr.textContent = '';
  elProg.style.width = '0%';
  elStats.textContent = '';
  elFinfo.textContent = '';
  elDetail.style.display = 'none';
  elDetail.innerHTML = '';
  btnDl.style.display = 'none';
  btnResume.style.display = 'none';
  btnRestart.style.display = 'none';
  btnReset.style.display = 'none';
  document.getElementById('debug-canvas').style.display = 'none';
  document.getElementById('debug-info').textContent = '';
  document.body.style.backgroundColor = '#222';
  state = S.SEARCHING;
  updateUI();
  // Restart camera if it was stopped
  if (!vid.srcObject || vid.srcObject.getTracks().every(t => t.readyState === 'ended')) {
    startCamera();
  } else if (!captureTimer) {
    captureTimer = setInterval(captureAndProcess, 66);
  }
}

btnRestart.onclick = fullReset;
btnReset.onclick = fullReset;

btnLog.onclick = () => {
  const lines = [
    `# Optical Transfer Receiver — Diagnostic Log`,
    `# Generated: ${new Date().toISOString()}`,
    `# User-Agent: ${navigator.userAgent}`,
    `# Entries: ${diagLog.length}`,
    '',
    ...diagLog.map(e =>
      `[${e.t}s] [${e.type}] ${e.msg}` + (e.extra ? '  ' + JSON.stringify(e.extra) : ''))
  ];
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `receiver-log-${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>
