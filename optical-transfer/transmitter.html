<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Optical Transfer — Transmitter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,system-ui,monospace;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh}
h1{font-size:1.3em;color:#7cf;margin-bottom:12px}

/* Drop zone */
#drop-zone{
  width:min(500px,90vw);padding:48px 24px;border:3px dashed #555;border-radius:12px;
  text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;
}
#drop-zone.hover{border-color:#7cf;background:rgba(100,180,255,.08)}
#drop-zone h2{font-size:1.1em;color:#aaa;margin-bottom:8px}
#drop-zone p{font-size:.8em;color:#666}
#file-input{display:none}

/* Info boxes */
#info{display:none;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.ib{background:#1a1a2a;border-radius:6px;padding:8px 12px;min-width:100px;text-align:center}
.ib .l{font-size:.6em;color:#888;text-transform:uppercase;letter-spacing:1px}
.ib .v{font-size:.95em;color:#fff;margin-top:2px}

/* Settings */
#settings{display:none;width:min(500px,90vw);background:#1a1a1a;border-radius:8px;padding:16px;margin-bottom:12px}
#settings h3{font-size:.9em;color:#7cf;margin-bottom:10px}
.setting{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.82em;color:#ccc}
.setting label{min-width:80px}
.setting input[type=range]{flex:1;max-width:180px}
.setting .val{min-width:50px;color:#7cf;text-align:right}

/* Canvas */
#canvas-wrap{display:none;position:relative}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;border:2px solid #333;border-radius:4px}

/* Controls */
#controls{display:none;margin-top:10px;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
button{background:#3a7cd5;border:none;color:#fff;padding:8px 20px;border-radius:5px;cursor:pointer;font-size:.9em;font-family:inherit}
button:hover{background:#5a9cf5}
button:disabled{background:#333;color:#666;cursor:default}
#phase{font-size:1em;font-weight:bold;color:#7cf;letter-spacing:2px;min-width:90px;text-align:center}
#progress-wrap{display:none;width:min(400px,90vw);background:#222;border-radius:4px;height:8px;overflow:hidden;margin-top:8px}
#progress-bar{height:100%;background:#3a7cd5;width:0%;transition:width .15s}
#stats{font-size:.72em;color:#777;text-align:center;margin-top:4px;min-height:1em}
#enc-status{font-size:.8em;color:#aaa;text-align:center;margin-top:6px;min-height:1em}
</style>
</head>
<body>
<h1>Optical Transfer — Transmitter</h1>

<div id="drop-zone">
  <h2>Drop a file here</h2>
  <p>or click to browse — any file type, any size</p>
</div>
<input type="file" id="file-input">

<div id="info">
  <div class="ib"><div class="l">File</div><div class="v" id="i-file">-</div></div>
  <div class="ib"><div class="l">Size</div><div class="v" id="i-size">-</div></div>
  <div class="ib"><div class="l">Compressed</div><div class="v" id="i-comp">-</div></div>
  <div class="ib"><div class="l">Blocks (K)</div><div class="v" id="i-k">-</div></div>
  <div class="ib"><div class="l">Est. Time</div><div class="v" id="i-time">-</div></div>
</div>

<div id="settings">
  <h3>Settings</h3>
  <div class="setting">
    <label>Grid size</label>
    <input type="range" id="s-grid" min="16" max="48" step="4" value="24">
    <span class="val" id="v-grid">24&#215;24</span>
  </div>
  <div class="setting">
    <label>FPS</label>
    <input type="range" id="s-fps" min="1" max="30" step="1" value="15">
    <span class="val" id="v-fps">15</span>
  </div>
  <div class="setting">
    <label>ECC %</label>
    <input type="range" id="s-ecc" min="5" max="50" step="5" value="20">
    <span class="val" id="v-ecc">20%</span>
  </div>
  <div class="setting">
    <label>Overhead</label>
    <input type="range" id="s-over" min="1.1" max="3.0" step="0.1" value="1.5">
    <span class="val" id="v-over">1.5&#215;</span>
  </div>
  <div class="setting">
    <label>Display</label>
    <input type="range" id="s-size" min="200" max="1200" step="20" value="720">
    <span class="val" id="v-size">720px</span>
  </div>
</div>

<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="controls">
  <span id="phase">READY</span>
  <button id="btn-start">&#9654; Start</button>
  <button id="btn-pause" disabled>&#9208; Pause</button>
  <button id="btn-stop" disabled>&#9209; Stop</button>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="stats"></div>
<div id="enc-status"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// GF(256) — primitive polynomial 0x11D, generator alpha=2
// ═══════════════════════════════════════════════════════════════════════════
const PRIM = 0x11D;
const gfExp = new Uint8Array(512);
const gfLog = new Uint8Array(256);
{
  let x = 1;
  for (let i = 0; i < 255; i++) {
    gfExp[i] = x; gfLog[x] = i;
    x <<= 1; if (x & 0x100) x ^= PRIM; x &= 0xFF;
  }
  for (let i = 255; i < 512; i++) gfExp[i] = gfExp[i - 255];
}
function gfMul(a, b) {
  if (a === 0 || b === 0) return 0;
  return gfExp[(gfLog[a] + gfLog[b]) % 255];
}

// ═══════════════════════════════════════════════════════════════════════════
// RS Encoder — systematic encoding (data + ECC appended)
// ═══════════════════════════════════════════════════════════════════════════
function rsGenPoly(nsym) {
  let g = new Uint8Array([1]);
  for (let i = 0; i < nsym; i++) {
    const factor = new Uint8Array([1, gfExp[i]]);
    const result = new Uint8Array(g.length + 1);
    for (let j = 0; j < g.length; j++)
      for (let k = 0; k < factor.length; k++)
        result[j + k] ^= gfMul(g[j], factor[k]);
    g = result;
  }
  return g;
}

const genPolyCache = {};
function rsEncode(data, nsym) {
  if (!genPolyCache[nsym]) genPolyCache[nsym] = rsGenPoly(nsym);
  const gen = genPolyCache[nsym];
  const n = data.length + nsym;
  const feedback = new Uint8Array(n);
  feedback.set(data);
  for (let i = 0; i < data.length; i++) {
    const coef = feedback[i];
    if (coef !== 0) {
      for (let j = 1; j < gen.length; j++)
        feedback[i + j] ^= gfMul(gen[j], coef);
    }
  }
  const result = new Uint8Array(n);
  result.set(data);
  for (let i = 0; i < nsym; i++) result[data.length + i] = feedback[data.length + i];
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// xorshift32 PRNG
// ═══════════════════════════════════════════════════════════════════════════
function xorshift32(state) {
  if (state === 0) state = 1;
  state ^= (state << 13);  state = state >>> 0;
  state ^= (state >>> 17);
  state ^= (state << 5);   state = state >>> 0;
  return state;
}

// ═══════════════════════════════════════════════════════════════════════════
// Robust Soliton CDF — c=0.1, delta=0.5
// ═══════════════════════════════════════════════════════════════════════════
function robustSolitonCdf(K) {
  const c = 0.1, delta = 0.5;
  if (K <= 1) return [{ degree: 1, cum: 1.0 }];
  const rho = new Float64Array(K + 1);
  rho[1] = 1.0 / K;
  for (let i = 2; i <= K; i++) rho[i] = 1.0 / (i * (i - 1));
  let S = c * Math.log(K / delta) * Math.sqrt(K);
  S = Math.max(S, 1.0);
  const pivot = Math.max(1, Math.round(K / S));
  const tau = new Float64Array(K + 1);
  for (let i = 1; i < pivot && i <= K; i++) tau[i] = S / (i * K);
  if (pivot <= K) tau[pivot] = S * Math.log(S / delta) / K;
  let total = 0;
  for (let i = 1; i <= K; i++) total += rho[i] + tau[i];
  const cdf = [];
  let cum = 0;
  for (let d = 1; d <= K; d++) {
    const prob = (rho[d] + tau[d]) / total;
    if (prob > 1e-10) { cum += prob; cdf.push({ degree: d, cum: Math.min(cum, 1.0) }); }
  }
  if (cdf.length > 0) cdf[cdf.length - 1].cum = 1.0;
  return cdf;
}

// ═══════════════════════════════════════════════════════════════════════════
// LT Symbol Generation
// ═══════════════════════════════════════════════════════════════════════════
function generateSymbol(i, K, blocks, blockSize, cdf) {
  let state = xorshift32((Math.imul(i + 1, 2654435761)) >>> 0);
  const r = state / 0xFFFFFFFF;
  let degree = 1;
  for (const entry of cdf) { if (r <= entry.cum) { degree = entry.degree; break; } }
  degree = Math.min(degree, K);

  let seed = ((Math.imul(i + 1, 1103515245) + 12345) >>> 0);
  if (seed === 0) seed = 1;
  const selected = new Set();
  let st = seed, attempts = 0;
  while (selected.size < degree && attempts < degree * 10) {
    st = xorshift32(st); selected.add(st % K); attempts++;
  }

  const symbol = new Uint8Array(blockSize);
  for (const idx of selected) {
    const blk = blocks[idx];
    for (let j = 0; j < blockSize; j++) symbol[j] ^= blk[j];
  }
  return symbol;
}

// ═══════════════════════════════════════════════════════════════════════════
// Frame Parameters
// ═══════════════════════════════════════════════════════════════════════════
function computeParams(gridSize, eccPercent) {
  const N = gridSize, dataCells = N * N - 36, frameBytes = Math.floor(dataCells / 4);
  const eccBytes = Math.max(2, Math.floor(frameBytes * eccPercent / 100));
  let nBlocks, totalPer, eccPer, dataPer;
  if (frameBytes <= 255) {
    nBlocks = 1; totalPer = frameBytes; eccPer = eccBytes; dataPer = frameBytes - eccBytes;
  } else {
    nBlocks = Math.ceil(frameBytes / 255);
    totalPer = Math.floor(frameBytes / nBlocks);
    eccPer = Math.floor(eccBytes / nBlocks);
    dataPer = totalPer - eccPer;
  }
  return { frameBytes, nBlocks, totalPer, eccPer, dataPer, payload: dataPer * nBlocks - 4 };
}

// ═══════════════════════════════════════════════════════════════════════════
// Grid Layout
// ═══════════════════════════════════════════════════════════════════════════
const DATA_COLORS = [[0,0,0],[255,0,0],[0,255,0],[0,0,255]];
const MARKER = { TL:[0,255,255], TR:[255,0,255], BL:[255,255,0], BR:[255,255,255] };
function isMarker(row, col, N) {
  const ms = 3;
  if (row < ms && col < ms) return 'TL';
  if (row < ms && col >= N-ms) return 'TR';
  if (row >= N-ms && col < ms) return 'BL';
  if (row >= N-ms && col >= N-ms) return 'BR';
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
// Build + Render a Single Frame On the Fly
// ═══════════════════════════════════════════════════════════════════════════
function buildFrameRaw(frameType, symbolIndex, payload, params) {
  const totalData = params.dataPer * params.nBlocks;
  const raw = new Uint8Array(totalData);
  raw[0] = frameType;
  raw[1] = (symbolIndex >> 16) & 0xFF;
  raw[2] = (symbolIndex >> 8) & 0xFF;
  raw[3] = symbolIndex & 0xFF;
  if (payload) raw.set(payload.subarray(0, Math.min(payload.length, totalData - 4)), 4);
  return raw;
}

function rsEncodeFrame(rawData, params) {
  const encoded = new Uint8Array(params.nBlocks * params.totalPer);
  for (let b = 0; b < params.nBlocks; b++) {
    const chunk = rawData.slice(b * params.dataPer, (b + 1) * params.dataPer);
    encoded.set(rsEncode(chunk, params.eccPer), b * params.totalPer);
  }
  return encoded;
}

function renderFrame(ctx, frameEncoded, N, cellPx) {
  const cells = new Uint8Array(frameEncoded.length * 4);
  for (let i = 0; i < frameEncoded.length; i++) {
    cells[i*4]     = (frameEncoded[i] >> 6) & 3;
    cells[i*4 + 1] = (frameEncoded[i] >> 4) & 3;
    cells[i*4 + 2] = (frameEncoded[i] >> 2) & 3;
    cells[i*4 + 3] = frameEncoded[i] & 3;
  }
  let ci = 0;
  for (let row = 0; row < N; row++) {
    for (let col = 0; col < N; col++) {
      const m = isMarker(row, col, N);
      const [r,g,b] = m ? MARKER[m] : DATA_COLORS[ci < cells.length ? cells[ci] : 0];
      if (!m) ci++;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(col * cellPx, row * cellPx, cellPx, cellPx);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SHA-256 via Web Crypto
// ═══════════════════════════════════════════════════════════════════════════
async function sha256(data) { return new Uint8Array(await crypto.subtle.digest('SHA-256', data)); }

// ═══════════════════════════════════════════════════════════════════════════
// File Handling
// ═══════════════════════════════════════════════════════════════════════════
let fileState = null;

async function prepareFile(file) {
  const rawData = new Uint8Array(await file.arrayBuffer());
  const sha256Bytes = await sha256(rawData);
  let compressed;
  try { compressed = pako.deflate(rawData, { level: 9 }); } catch (e) { compressed = rawData; }
  let data, isCompressed;
  if (compressed.length < rawData.length) {
    data = new Uint8Array(1 + compressed.length);
    data[0] = 0x01; data.set(compressed, 1);
    isCompressed = true;
  } else {
    data = new Uint8Array(1 + rawData.length);
    data[0] = 0x00; data.set(rawData, 1);
    isCompressed = false;
  }
  return { rawData, filename: file.name, fileSize: rawData.length, sha256Bytes, data, isCompressed, compressedSize: compressed.length };
}

function buildBlocks(data, blockSize) {
  const K = Math.ceil(data.length / blockSize);
  const padded = new Uint8Array(K * blockSize);
  padded.set(data);
  const blocks = [];
  for (let i = 0; i < K; i++) blocks.push(padded.slice(i * blockSize, (i + 1) * blockSize));
  return { K, blocks };
}

function buildConfigPayload(cfg) {
  const maxFn = Math.max(0, cfg.blockSize - 46);
  const fnBytes = new TextEncoder().encode(cfg.filename).slice(0, maxFn);
  const p = new Uint8Array(46 + fnBytes.length);
  p[0] = cfg.gridSize; p[1] = 4; p[2] = cfg.fps; p[3] = cfg.eccPercent;
  new DataView(p.buffer).setUint32(4, cfg.fileSize, false);
  new DataView(p.buffer).setUint16(8, cfg.K, false);
  new DataView(p.buffer).setUint16(10, cfg.blockSize, false);
  p.set(cfg.sha256Bytes, 12);
  p[44] = cfg.isCompressed ? 0x01 : 0x00;
  p[45] = fnBytes.length;
  p.set(fnBytes, 46);
  return p;
}

function buildEndPayload(sha256Bytes, totalSymbols) {
  const p = new Uint8Array(36);
  p.set(sha256Bytes);
  new DataView(p.buffer).setUint32(32, totalSymbols, false);
  return p;
}

// ═══════════════════════════════════════════════════════════════════════════
// Transmission Engine
// ═══════════════════════════════════════════════════════════════════════════
let txState = null;

function initTransmission() {
  const gridSize = parseInt(document.getElementById('s-grid').value);
  const fps = parseInt(document.getElementById('s-fps').value);
  const eccPercent = parseInt(document.getElementById('s-ecc').value);
  const overhead = parseFloat(document.getElementById('s-over').value);
  const params = computeParams(gridSize, eccPercent);
  if (params.payload <= 0) {
    document.getElementById('enc-status').textContent = 'ERROR: Grid too small for this ECC level.';
    return null;
  }
  const blockSize = params.payload;
  const { K, blocks } = buildBlocks(fileState.data, blockSize);
  const cdf = robustSolitonCdf(K);
  const numSymbols = Math.max(K + 10, Math.floor(K * overhead));
  const configPayload = buildConfigPayload({
    gridSize, fps, eccPercent, fileSize: fileState.fileSize,
    K, blockSize, sha256Bytes: fileState.sha256Bytes,
    isCompressed: fileState.isCompressed, filename: fileState.filename
  });
  const endPayload = buildEndPayload(fileState.sha256Bytes, numSymbols);
  const configCount = fps, dataCount = numSymbols, endCount = fps;
  return { gridSize, fps, params, blockSize, K, blocks, cdf, numSymbols,
           configPayload, endPayload, configCount, dataCount, endCount,
           totalFrames: configCount + dataCount + endCount };
}

function generateFrameAt(tx, idx) {
  const { params, configPayload, endPayload, K, blocks, blockSize, cdf, configCount, dataCount } = tx;
  let raw;
  if (idx < configCount) {
    raw = buildFrameRaw(0x00, 0, configPayload, params);
  } else if (idx < configCount + dataCount) {
    const si = idx - configCount;
    raw = buildFrameRaw(0x01, si, generateSymbol(si, K, blocks, blockSize, cdf), params);
  } else {
    raw = buildFrameRaw(0xFF, 0xFFFFFF, endPayload, params);
  }
  return rsEncodeFrame(raw, params);
}

// ═══════════════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let timer = null, running = false, paused = false, frameIdx = 0, loops = 0, t0 = 0;

function fmtB(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function updateEstimates() {
  if (!fileState) return;
  const params = computeParams(+document.getElementById('s-grid').value, +document.getElementById('s-ecc').value);
  if (params.payload <= 0) { document.getElementById('i-k').textContent = 'ERR'; return; }
  const K = Math.ceil(fileState.data.length / params.payload);
  const fps = +document.getElementById('s-fps').value;
  const numSym = Math.max(K + 10, Math.floor(K * +document.getElementById('s-over').value));
  document.getElementById('i-k').textContent = K;
  document.getElementById('i-time').textContent = ((fps + numSym + fps) / fps).toFixed(1) + 's';
}

for (const [id, fmt] of [['s-grid',v=>v+'\u00D7'+v],['s-fps',v=>v],['s-ecc',v=>v+'%'],['s-over',v=>v+'\u00D7'],['s-size',v=>v+'px']]) {
  const el = document.getElementById(id);
  el.oninput = () => { document.getElementById('v-'+id.slice(2)).textContent = fmt(el.value); updateEstimates(); };
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('hover'); };
dropZone.ondragleave = () => dropZone.classList.remove('hover');
dropZone.ondrop = async e => { e.preventDefault(); dropZone.classList.remove('hover'); if (e.dataTransfer.files.length) await loadFile(e.dataTransfer.files[0]); };
fileInput.onchange = async () => { if (fileInput.files.length) await loadFile(fileInput.files[0]); };

async function loadFile(file) {
  document.getElementById('enc-status').textContent = 'Reading file...';
  fileState = await prepareFile(file);
  document.getElementById('enc-status').textContent = '';
  document.getElementById('i-file').textContent = fileState.filename.length > 20 ? fileState.filename.slice(0,18) + '\u2026' : fileState.filename;
  document.getElementById('i-size').textContent = fmtB(fileState.fileSize);
  document.getElementById('i-comp').textContent = fileState.isCompressed
    ? fmtB(fileState.compressedSize) + ' (' + Math.round(fileState.compressedSize / fileState.fileSize * 100) + '%)'
    : 'none';
  document.getElementById('info').style.display = 'flex';
  document.getElementById('settings').style.display = 'block';
  document.getElementById('canvas-wrap').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  updateEstimates();
  dropZone.innerHTML = '<h2>' + fileState.filename + '</h2><p>' + fmtB(fileState.fileSize) + ' \u2014 click to change</p>';
  // Canvas preview
  const N = +document.getElementById('s-grid').value, sz = +document.getElementById('s-size').value;
  const cp = Math.floor(sz / N); canvas.width = cp * N; canvas.height = cp * N;
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const m = isMarker(r, c, N);
    if (m) { const [R,G,B] = MARKER[m]; ctx.fillStyle = `rgb(${R},${G},${B})`; ctx.fillRect(c*cp, r*cp, cp, cp); }
  }
}

document.getElementById('btn-start').onclick = () => {
  if (!fileState || running) return;
  txState = initTransmission();
  if (!txState) return;
  running = true; paused = false; frameIdx = 0; loops = 0; t0 = Date.now();
  const N = txState.gridSize, sz = +document.getElementById('s-size').value;
  const cp = Math.floor(sz / N); canvas.width = cp * N; canvas.height = cp * N;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('settings').style.pointerEvents = 'none';
  document.getElementById('settings').style.opacity = '0.5';
  dropZone.style.pointerEvents = 'none'; dropZone.style.opacity = '0.5';
  timer = setInterval(tick, 1000 / txState.fps);
};

document.getElementById('btn-pause').onclick = () => {
  if (!running) return;
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '\u25B6 Resume' : '\u23F8 Pause';
  document.getElementById('phase').textContent = paused ? 'PAUSED' : 'DATA';
};

document.getElementById('btn-stop').onclick = () => {
  running = false; paused = false;
  if (timer) { clearInterval(timer); timer = null; }
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-pause').textContent = '\u23F8 Pause';
  document.getElementById('phase').textContent = 'STOPPED';
  document.getElementById('settings').style.pointerEvents = '';
  document.getElementById('settings').style.opacity = '';
  dropZone.style.pointerEvents = ''; dropZone.style.opacity = '';
};

function tick() {
  if (!running || paused) return;
  const tx = txState, N = tx.gridSize, sz = +document.getElementById('s-size').value;
  const cp = Math.floor(sz / N);
  const li = frameIdx % tx.totalFrames;
  renderFrame(ctx, generateFrameAt(tx, li), N, cp);
  let phase = li < tx.configCount ? 'CONFIG' : li < tx.configCount + tx.dataCount ? 'DATA' : 'END';
  if (loops > 0 && phase === 'DATA') phase = 'LOOPING';
  document.getElementById('phase').textContent = phase;
  document.getElementById('progress-bar').style.width = Math.min(100, li / tx.totalFrames * 100) + '%';
  const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
  const dataSent = Math.max(0, Math.min(li - tx.configCount, tx.dataCount));
  document.getElementById('stats').textContent =
    `Frame ${li}/${tx.totalFrames} | Loop ${loops} | ${elapsed}s | ~${fmtB(dataSent * tx.blockSize)} sent`;
  frameIdx++;
  if (frameIdx % tx.totalFrames === 0) { frameIdx = tx.configCount; loops++; }
}
</script>
