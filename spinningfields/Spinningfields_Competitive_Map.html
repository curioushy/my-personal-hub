    <script>
        // Utility Functions
        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371000; // Earth's radius in meters
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.round(R * c); // returns meters
        }

        function classifyVintage(year) {
            if (!year || isNaN(year)) return 'Unknown';
            const y = parseInt(year);
            const now = 2026;
            const age = now - y;
            if (age <= 5) return 'New';
            if (age <= 10) return 'Recent';
            if (age <= 20) return 'Modern';
            return 'Established';
        }

        function formatNLA(nla) {
            if (!nla) return '—';
            var num = parseInt(String(nla).replace(/[^0-9]/g, ''), 10);
            if (isNaN(num) || num === 0) return String(nla);
            return num.toLocaleString();
        }

        function parseNLA(nla) {
            return parseInt(String(nla).replace(/[^0-9]/g, ''), 10) || 0;
        }

        function classifyBySize(nla) {
            var size = parseNLA(nla);
            if (size >= 300000) return 'Trophy Asset';
            if (size >= 150000) return 'Major';
            if (size >= 50000) return 'Secondary';
            return 'Tertiary';
        }

        function classifySubmarket(lat, lon, submarkets) {
            if (!submarkets || submarkets.length === 0) return 'Central';
            for (const submarket of submarkets) {
                // Method 1: Condition string (e.g. "lon < -2.250 && lat > 53.478")
                if (submarket.condition) {
                    try {
                        if (new Function('lat', 'lon', 'return (' + submarket.condition + ');')(lat, lon)) {
                            return submarket.name;
                        }
                    } catch(e) { /* skip invalid condition */ }
                    continue;
                }
                // Method 2: Bounding box
                if (submarket.lat_min !== undefined && submarket.lat_max !== undefined &&
                    submarket.lon_min !== undefined && submarket.lon_max !== undefined) {
                    if (lat >= submarket.lat_min && lat <= submarket.lat_max &&
                        lon >= submarket.lon_min && lon <= submarket.lon_max) {
                        return submarket.name;
                    }
                }
            }
            // Fallback: return last submarket name (typically the catch-all) or 'Central'
            return submarkets[submarkets.length - 1]?.name || 'Central';
        }

        function getOwnerInsight(owner, ownerInsights) {
            if (!ownerInsights || !owner) return '';
            // Handle array format: [{match, text}, ...]
            if (Array.isArray(ownerInsights)) {
                const match = ownerInsights.find(o => o.match && owner.toLowerCase().includes(o.match.toLowerCase()));
                return match ? match.text : '';
            }
            // Handle object format: {ownerName: text, ...}
            if (typeof ownerInsights === 'object') {
                for (const key in ownerInsights) {
                    if (owner.toLowerCase().includes(key.toLowerCase())) {
                        return ownerInsights[key];
                    }
                }
            }
            return '';
        }

        function toggleSection(headerEl) {
            const body = headerEl.nextElementSibling;
            if (!body || !body.classList.contains('section-body')) return;

            const icon = headerEl.querySelector('.collapse-icon');
            body.classList.toggle('collapsed');
            if (icon) icon.classList.toggle('collapsed');

            // If reopening a section with a Chart.js canvas, trigger resize
            if (!body.classList.contains('collapsed')) {
                const canvas = body.querySelector('canvas');
                if (canvas) {
                    setTimeout(() => {
                        const chartInstance = Chart.getChart(canvas);
                        if (chartInstance) chartInstance.resize();
                    }, 400);
                }
            }
        }

        function sortTable(colIdx, sortType) {
            // Get the table that was clicked
            const th = event.target.closest('th.sortable');
            if (!th) return;

            const table = th.closest('table');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            // Remove sort classes from all headers
            table.querySelectorAll('th.sortable').forEach(h => {
                h.classList.remove('sort-asc', 'sort-desc');
            });

            // Determine sort direction
            const isAsc = !th.classList.contains('sort-asc');
            if (isAsc) {
                th.classList.add('sort-asc');
                th.classList.remove('sort-desc');
            } else {
                th.classList.add('sort-desc');
                th.classList.remove('sort-asc');
            }

            // Sort rows
            rows.sort((a, b) => {
                let aVal = a.cells[colIdx]?.textContent.trim() || '';
                let bVal = b.cells[colIdx]?.textContent.trim() || '';

                if (sortType === 'number') {
                    aVal = parseFloat(aVal.replace(/[^0-9.-]/g, '')) || 0;
                    bVal = parseFloat(bVal.replace(/[^0-9.-]/g, '')) || 0;
                } else if (sortType === 'date') {
                    aVal = new Date(aVal).getTime() || 0;
                    bVal = new Date(bVal).getTime() || 0;
                }

                return isAsc ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
            });

            // Re-append sorted rows
            rows.forEach(row => tbody.appendChild(row));
        }

        function generateCompetitivePosition(building, allBuildings, submarkets, ownerInsights) {
            if (!building) return '';

            // Find all competitors within 500m, sorted by distance
            const allNearby = allBuildings
                .filter(b => b.name !== building.name)
                .map(b => ({
                    ...b,
                    distance: getDistance(building.lat, building.lon, b.lat, b.lon)
                }))
                .filter(b => b.distance <= 500)
                .sort((a, b) => a.distance - b.distance);
            const nearestCompetitors = allNearby.slice(0, 5);

            // Metrics
            const sizeRank = classifyBySize(building.nla);
            const submarketName = classifySubmarket(building.lat, building.lon, submarkets);
            const ownerInsight = getOwnerInsight(building.owner, ownerInsights);

            let html = '<div class="competitive-grid">';
            html += `<div class="metric-card"><div class="label">Size Rank</div><div class="value">${sizeRank}</div></div>`;
            html += `<div class="metric-card"><div class="label">Submarket</div><div class="value">${submarketName}</div></div>`;
            html += `<div class="metric-card"><div class="label">Within 500m</div><div class="value">${allNearby.length}</div></div>`;
            html += `<div class="metric-card"><div class="label">Owner Type</div><div class="value">${building.owner.length > 20 ? 'Institutional' : 'Private'}</div></div>`;
            html += '</div>';

            // Nearest competitors table
            if (nearestCompetitors.length > 0) {
                html += '<div class="nearest-competitors">';
                html += `<h4>Closest ${nearestCompetitors.length} Competitors (of ${allNearby.length} within 500m)</h4>`;
                html += '<table><thead><tr><th>Building</th><th>Distance (m)</th><th>NLA</th><th>Owner</th></tr></thead><tbody>';
                nearestCompetitors.forEach(comp => {
                    const compSizeRank = classifyBySize(comp.nla);
                    html += `<tr>
                        <td class="building-name">${comp.name}</td>
                        <td>${Math.round(comp.distance)}m</td>
                        <td>${formatNLA(comp.nla)} sq ft</td>
                        <td>${comp.owner}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                html += '</div>';
            }

            // Narrative sections
            html += '<div class="narrative-section">';
            html += '<h4>Size & Positioning</h4>';
            html += `<p>${building.name} (${formatNLA(building.nla)} sq ft, ${building.floors} floors) is classified as a <strong>${sizeRank}</strong> asset in the ${submarketName} submarket. Built in ${building.year}, it competes within the ${classifyVintage(building.year).toLowerCase()} vintage segment.</p>`;
            html += '</div>';

            if (ownerInsight) {
                html += '<div class="narrative-section">';
                html += '<h4>Ownership</h4>';
                html += `<p>${ownerInsight}</p>`;
                html += '</div>';
            }

            html += '<div class="narrative-section">';
            html += '<h4>Submarket Context</h4>';
            html += `<p>Located in the ${submarketName} submarket, this building serves a diverse market with mixed-use demand drivers including office, retail, and amenity use.</p>`;
            html += '</div>';

            if (building.txn) {
                html += '<div class="narrative-section">';
                html += '<h4>Transaction History</h4>';
                html += `<p><strong>Notable Transactions:</strong> ${building.txn}</p>`;
                html += '</div>';
            }

            return html;
        }

        function updateCompetitivePosition(building, data) {
            const competitiveContent = document.getElementById('competitiveContent');
            if (!competitiveContent) return;

            const html = generateCompetitivePosition(
                building,
                data.keyBuildings,
                data.submarkets || [],
                data.ownerInsights || []

            competitiveContent.innerHTML = html;

        // Generate availability HTML (returns string, doesn't touch DOM)
        function renderAvailabilityHTML(buildingName, ba) {
            var html = '';

            if (!ba || !ba.status) {
                return '<p class="bp-avail-empty">No availability data tracked for this building.</p>';
            }

            // Leasing agents summary — deduplicate across all marketed spaces
            if (ba.marketedSpaces && ba.marketedSpaces.length > 0) {
                var agentSet = {};
                ba.marketedSpaces.forEach(function(s) {
                    if (s.agent) agentSet[s.agent] = true;
                });
                var agents = Object.keys(agentSet);
                if (agents.length > 0) {
                    html += '<p style="font-size:0.82rem;color:#555;margin-bottom:0.6rem;"><strong>Leasing agent' + (agents.length > 1 ? 's' : '') + ':</strong> ' + agents.join(', ') + '</p>';
                }
            }

            // Marketed spaces cards
            if (ba.marketedSpaces && ba.marketedSpaces.length > 0) {
                ba.marketedSpaces.forEach(function(space) {
                    html += '<div class="bp-avail-card">';
                    html += '<div class="bp-avail-card-header">';
                    html += '<span class="bp-avail-floor">' + space.floor + '</span>';
                    html += '<span class="bp-avail-size">' + space.sqft + ' sq ft</span>';
                    html += '</div>';
                    html += '<div class="bp-avail-details">';
                    if (space.condition) html += '<strong>Condition:</strong> ' + space.condition;
                    if (space.rent && space.rent !== '—') html += ' · <strong>Rent:</strong> ' + space.rent;
                    html += '<br/><strong>Agent:</strong> ' + (space.agent || '—');
                    html += '</div>';
                    if (space.url) {
                        html += '<a class="bp-avail-agent-link" href="' + space.url + '" target="_blank" rel="noopener">View listing (' + (space.urlSource || space.agent) + ') →</a>';
                    }
                    if (space.notes) {
                        html += '<div class="bp-avail-note">' + space.notes + '</div>';
                    }
                    html += '</div>';
                });
            } else if (ba.status === 'Fully Let') {
                html += '<p class="bp-avail-empty">No marketed spaces — building appears fully let.</p>';
            } else {
                html += '<p class="bp-avail-empty">No individual spaces data available.</p>';
            }

            // Availability page link
            if (ba.availabilityPageUrl) {
                html += '<a class="bp-avail-page-link" href="' + ba.availabilityPageUrl + '" target="_blank" rel="noopener">View availability page →</a>';
            }

            // Building-level notes
            if (ba.notes) {
                html += '<div class="bp-avail-note" style="margin-top:0.5rem;">' + ba.notes + '</div>';
            }

            return html;
        }

        function getBuildingColor(buildingType) {
            if (!buildingType) return '#d2b48c';
            const type = buildingType.toLowerCase();
            if (type.includes('office') || type.includes('commercial')) return '#4575b4';
            if (type.includes('hotel')) return '#228b22';
            if (type.includes('cultural') || type.includes('museum') || type.includes('theatre')) return '#ff8c00';
            if (type.includes('government') || type.includes('civic')) return '#a1a1a1';
            if (type.includes('residential')) return '#add8e6';
            if (type.includes('retail')) return '#ffff00';
            if (type.includes('restaurant') || type.includes('cafe')) return '#f59e0b';
            if (type.includes('education')) return '#9370db';
            if (type.includes('religious')) return '#ffb6c1';
            return '#d2b48c';
        }

        function filterByBuilding(buildingName, data) {
            if (!window.map) return;

            // Reset all markers to default style
            data.keyBuildings.forEach(b => {
                const m = window.keyBuildingMarkers[b.name];
                if (!m) return;
                const hasProfile = (data.buildingProfiles && data.buildingProfiles[b.name]);
                m.setStyle({
                    radius: hasProfile ? 11 : 8,
                    fillColor: hasProfile ? '#2c5282' : '#4575b4',
                    color: hasProfile ? '#1a3a52' : '#2c5282',
                    weight: 2,
                    fillOpacity: hasProfile ? 0.85 : 0.7
                });
                m.setRadius(hasProfile ? 11 : 8);
            });

            // Highlight selected building in red
            if (buildingName && window.keyBuildingMarkers[buildingName]) {
                const m = window.keyBuildingMarkers[buildingName];
                m.setStyle({
                    radius: 14,
                    fillColor: '#d73027',
                    color: '#a01a1a',
                    weight: 3,
                    fillOpacity: 0.9
                });
                m.setRadius(14);
                m.bringToFront();
            }

            // Update table row highlighting
            document.querySelectorAll('tbody tr').forEach(row => {
                row.classList.remove('your-building');

                    row.classList.add('your-building');

                    window.map.setView([building.lat, building.lon], data.zoom + 1);
                    window.keyBuildingMarkers[buildingName].openPopup();

            if (data.chartData) {
                html += `<div class="tables-section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <h2 class="table-title" style="color: #1e40af;margin-bottom:0;">${data.chartData.title || 'Market Metrics'}</h2>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="section-body">
                        <div style="position:relative;height:320px;max-height:320px;">
                            <canvas id="rentYieldChart"></canvas>
                        </div>
                        <p style="margin-top:0.75rem;font-size:0.85rem;color:#888;">Source: <a href="https://www.savills.co.uk/research_articles/229130/382566-0" target="_blank" style="color:#2c5282;">Savills Manchester Office Spotlight Autumn 2025</a> | <a href="https://www.cre-insider.com/post/manchester-office-market-outlook-2026" target="_blank" style="color:#2c5282;">CBRE Manchester Office Outlook 2026</a> | <a href="https://www.oktra.co.uk/insights/the-cost-of-office-space-in-manchester-2026/" target="_blank" style="color:#2c5282;">Oktra Manchester Office Costs 2026</a>. 2026F–2027F are forecasts.</p>
                    </div>
                </div>`;
            }

            // Leasing activity table
            if (data.leasingActivity && data.leasingActivity.length > 0) {
                html += `<div class="tables-section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <h2 class="table-title" style="color: #b45309;margin-bottom:0;">Leasing Activity</h2>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="section-body">
                        <table id="leasingTable">
                            <thead>
                                <tr>
                                    <th class="sortable" onclick="sortTable(0, 'string')">Building</th>
                                    <th class="sortable" onclick="sortTable(1, 'string')">Tenant</th>
                                    <th class="sortable" onclick="sortTable(2, 'number')">Area (sq ft)</th>
                                    <th class="sortable" onclick="sortTable(3, 'string')">Rent</th>
                                    <th class="sortable" onclick="sortTable(4, 'date')">Date</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>`;
                data.leasingActivity.forEach(item => {
                    html += `<tr data-building="${item.building}">
                        <td class="building-name">${item.building}</td>
                        <td>${item.tenant}</td>
                        <td>${item.area || '—'}</td>
                        <td>${item.rent || '—'}</td>
                        <td>${item.date}</td>
                        <td>${item.notes || ''}</td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`;
            }

            // Submarket rent table
            if (data.submarketRentTable) {
                html += `<div class="tables-section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <h2 class="table-title" style="color: #059669;margin-bottom:0;">Submarket Rent Ranges</h2>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="section-body">
                        <table>
                            <thead>
                                <tr>`;
                data.submarketRentTable.headers.forEach(header => {
                    html += `<th>${header}</th>`;
                });
                html += `</tr></thead><tbody>`;
                data.submarketRentTable.rows.forEach(row => {
                    html += `<tr>`;
                    row.forEach(cell => {
                        html += `<td>${cell}</td>`;
                    });
                    html += `</tr>`;
                });
                html += `</tbody></table>`;
                if (data.submarketRentTable.source) {
                    html += `<p style="margin-top:0.75rem;font-size:0.85rem;color:#888;"><strong>Source:</strong> ${data.submarketRentTable.source}</p>`;
                }
                html += `</div></div>`;
            }

            // Buildings table — derives status & availability from AVAILABILITY_DATA
            const avail = window.AVAILABILITY_DATA ? window.AVAILABILITY_DATA.buildings : {};
            html += `<div class="tables-section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h2 class="table-title" style="margin-bottom:0;">Building Inventory — All Mapped Buildings</h2>
                    <span class="collapse-icon">▼</span>
                </div>
                <div class="section-body">
                    <table id="buildingsTable">
                        <thead>
                            <tr>
                                <th class="sortable" onclick="sortTable(0, 'string')">Building Name</th>
                                <th class="sortable" onclick="sortTable(1, 'number')">Size (sq ft)</th>
                                <th class="sortable" onclick="sortTable(2, 'string')">Year</th>
                                <th class="sortable" onclick="sortTable(3, 'string')">Owner</th>
                                <th class="sortable" onclick="sortTable(4, 'string')">Status</th>
                                <th>Marketed Spaces</th>
                                <th>Agent(s)</th>
                            </tr>
                        </thead>
                        <tbody>`;

            [...data.keyBuildings].sort((a, b) => a.name.localeCompare(b.name)).forEach(building => {
                const ba = avail[building.name] || {};
                const status = ba.status || '—';
                const statusClass = status === 'Fully Let' ? 'status-fully-let' :
                    status === 'Leasing' ? 'status-leasing' :
                    status === 'Refurb' ? 'status-refurb' :
                    status === 'Pipeline' ? 'status-pipeline' :
                    status === 'Non-office' ? 'status-non-office' : '';

                // Per-floor breakdown of marketed spaces
                let spacesDisplay = '—';
                if (ba.marketedSpaces && ba.marketedSpaces.length > 0) {
                    spacesDisplay = ba.marketedSpaces.map(s =>
                        '<span style="white-space:nowrap;">' + s.floor + ' · ' + s.sqft + ' sq ft</span>'
                    ).join('<br/>');
                }

                // Deduplicated agents
                let agentsDisplay = '—';
                if (ba.marketedSpaces && ba.marketedSpaces.length > 0) {
                    const agentSet = {};
                    ba.marketedSpaces.forEach(s => { if (s.agent) agentSet[s.agent] = true; });
                    const agents = Object.keys(agentSet);
                    if (agents.length > 0) agentsDisplay = agents.join(', ');
                }

                html += `<tr data-building="${building.name}">
                    <td><a class="building-name-link" onclick="openBuildingDetail('${building.name.replace(/'/g, "\\'")}')">${building.name}</a></td>
                    <td>${formatNLA(building.nla)} sq ft</td>
                    <td>${building.year}</td>
                    <td>${building.owner}</td>
                    <td><span class="status-badge ${statusClass}">${status}</span></td>
                    <td style="font-size:0.82rem;line-height:1.5;color:#555;">${spacesDisplay}</td>
                    <td style="font-size:0.82rem;color:#555;">${agentsDisplay}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            if (window.AVAILABILITY_DATA) {
                html += `<p style="margin-top:0.6rem;font-size:0.78rem;color:#aaa;">Availability data last verified: ${window.AVAILABILITY_DATA.lastVerified}. Status and available sq ft derived from marketed listings — actual vacancy may differ.</p>`;
            }
            html += `</div></div>`;

            // Footer
            html += `<div class="map-footer">`;
            html += `Spinningfields & Deansgate Competitive Map · Exploratory Series by Curious_HY<br/>`;
            html += `Building data compiled from public sources. `;
            if (window.AVAILABILITY_DATA) {
                html += `Availability data last verified: <strong>${window.AVAILABILITY_DATA.lastVerified}</strong>. `;
            }
            html += `Marketed spaces and status reflect agent listings at time of verification — actual availability may differ.`;
            html += `</div>`;

            container.innerHTML = html;

            // Initialize map, chart, and event listeners
            initMap(data);
            if (data.chartData) {
                initChart(data.chartData);
            }

            const buildingSelect = document.getElementById('buildingSelect');
            if (buildingSelect) {
                buildingSelect.addEventListener('change', (e) => {
                    filterByBuilding(e.target.value, data);
                    if (e.target.value) {
                        document.getElementById('selectedBuildingLabel').innerHTML = `<strong>Your Building:</strong> ${e.target.value}`;
                    } else {
                        document.getElementById('selectedBuildingLabel').innerHTML = '<strong>Your Building:</strong> <em>None selected</em>';
                    }
                });
            }
        }

        function renderLandingPage(sites, siteCounts) {
            var container = document.getElementById('mainContainer');
            var html = '<div class="landing-container">';

            sites.forEach(function(siteId) {
                var meta = SITE_META[siteId] || {};
                var count = siteCounts[siteId] || meta.buildings || 0;
                var title = meta.title || siteId.charAt(0).toUpperCase() + siteId.slice(1);
                var desc = meta.desc || 'Commercial competitive landscape analysis';
                html += '<div class="site-card" onclick="window.location.href=\'?site=' + siteId + '\'">' +
                    '<h2>' + title + '</h2>' +
                    '<p>' + desc + '</p>' +
                    '<div class="building-count">' + count + ' buildings mapped</div>' +
                '</div>';
            });

            html += '</div>';
            container.innerHTML = html;
        }

// === SITE DATA loaded from external file (spinningfields_data.js) ===

        // Main initialization (standalone — skip landing page, load data directly)
        document.addEventListener('DOMContentLoaded', function() {
            var data = window.SITE_DATA;
            if (!data) { document.getElementById('mainContainer').innerHTML = '<p>Error: Site data not found.</p>'; return; }

            // Update header
            document.getElementById('pageTitle').textContent = data.title || 'Competitive Map';
            document.getElementById('pageSubtitle').textContent = data.subtitle || 'Exploratory Series by Curious_HY';

            // Render site details
            renderSiteDetails(data);
        });
    </script>

    <!-- Detail panel is now inline beside the map (rendered by renderSiteDetails) -->

</body>
</html>
