function buildLevel(cols, rows, elements) {
  const grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = new Array(cols).fill(EMPTY);
  }
  for (const el of elements) {
    for (let i = 0; i < el.w; i++) {
      if (el.y >= 0 && el.y < rows && el.x + i >= 0 && el.x + i < cols) {
        grid[el.y][el.x + i] = el.type;
      }
    }
  }
  return { cols, rows, grid };
}

const keys = { left: false, right: false, jump: false, enter: false };
let jumpReleased = true;

document.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA')  keys.left  = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = true;
  if (e.code === 'Enter') keys.enter = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA')  keys.left  = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    keys.jump = false;
    jumpReleased = true;
  }
  if (e.code === 'Enter') keys.enter = false;
});

// ── Touch / mobile controls ──────────────────────────────────────────────────
(function setupTouch() {
  // Show overlay on touch-capable devices
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touch-controls').style.display = 'block';
  }

  function bindBtn(id, keyName, onRelease) {
    const el = document.getElementById(id);
    const press = (ev) => {
      ev.preventDefault();
      keys[keyName] = true;
      el.classList.add('pressed');
    };
    const release = (ev) => {
      ev.preventDefault();
      keys[keyName] = false;
      el.classList.remove('pressed');
      if (onRelease) onRelease();
    };
    el.addEventListener('touchstart',  press,   { passive: false });
    el.addEventListener('touchend',    release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    // Also support mouse clicks for desktop testing
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup',   release);
    el.addEventListener('mouseleave',release);
  }

  bindBtn('btn-left',  'left');
  bindBtn('btn-right', 'right');
  // Jump button: on release, mark jump as released so next tap triggers a new jump
  bindBtn('btn-jump', 'jump', () => { jumpReleased = true; });
  bindBtn('btn-enter','enter');
})();

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
let audioCtx = null;
let musicGain = null;
let sfxGain = null;
let musicPlaying = false;
let musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.18;
  musicGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.25;
  sfxGain.connect(audioCtx.destination);
}

// --- Sound effects ---
function playTone(freq, duration, type, gainVal, dest) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(gainVal || 0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(g);
  g.connect(dest || sfxGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() {
  playTone(440, 0.12, 'square', 0.12);
  playTone(580, 0.1, 'square', 0.08);
}

function sfxDoubleJump() {
  playTone(600, 0.08, 'sine', 0.12);
  setTimeout(() => playTone(800, 0.1, 'sine', 0.12), 50);
  setTimeout(() => playTone(1000, 0.12, 'triangle', 0.1), 100);
}

function sfxCollect() {
  playTone(880, 0.08, 'sine', 0.15);
  setTimeout(() => playTone(1320, 0.15, 'sine', 0.12), 60);

// --- Background music ---
// Simple looping melody using oscillators
const MELODY = [
  // [note freq, duration in beats]
  [523, 1], [587, 1], [659, 1], [784, 2], [659, 1],
  [784, 1], [880, 2], [784, 1], [659, 1], [587, 2],
  [523, 1], [440, 1], [523, 2], [587, 1], [523, 1],
  [440, 1], [392, 2], [440, 1], [523, 2], [0, 1],
];

const BASS = [
  [131, 4], [165, 4], [175, 4], [131, 4],
  [110, 4], [131, 4], [98, 4], [131, 4],
];

let melodyIndex = 0;
let bassIndex = 0;
let nextMelodyTime = 0;
let nextBassTime = 0;
const BEAT = 0.22;

function startMusic() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;
  melodyIndex = 0;
  bassIndex = 0;
  nextMelodyTime = audioCtx.currentTime + 0.1;
  nextBassTime = audioCtx.currentTime + 0.1;
  scheduleMusicChunk();
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
}

function scheduleMusicChunk() {
  if (!musicPlaying || !audioCtx) return;

  const lookAhead = 2.0; // schedule 2 seconds ahead
  const now = audioCtx.currentTime;

  // Schedule melody notes
  while (nextMelodyTime < now + lookAhead) {
    const [freq, beats] = MELODY[melodyIndex % MELODY.length];
    const dur = beats * BEAT;
    if (freq > 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.12, nextMelodyTime);
      g.gain.exponentialRampToValueAtTime(0.001, nextMelodyTime + dur * 0.9);
      osc.connect(g);
      g.connect(musicGain);
      osc.start(nextMelodyTime);
      osc.stop(nextMelodyTime + dur);
      musicNodes.push(osc);
    }
    nextMelodyTime += dur;
    melodyIndex++;
  }

  // Schedule bass notes
  while (nextBassTime < now + lookAhead) {
    const [freq, beats] = BASS[bassIndex % BASS.length];
    const dur = beats * BEAT;
    if (freq > 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.08, nextBassTime);
      g.gain.exponentialRampToValueAtTime(0.001, nextBassTime + dur * 0.85);
      osc.connect(g);
      g.connect(musicGain);
      osc.start(nextBassTime);
      osc.stop(nextBassTime + dur);
      musicNodes.push(osc);
    }
    nextBassTime += dur;
    bassIndex++;
  }

  // Clean up old nodes
  musicNodes = musicNodes.filter(n => {
    try { return n.context.currentTime < n._stopTime; } catch(e) { return false; }
  });

  // Keep scheduling
  if (musicPlaying) {
    setTimeout(scheduleMusicChunk, 500);
  }
}

// ═══════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════
const camera = { x: 0, y: 0 };

function updateCamera() {
  const targetX = player.x + player.w / 2 - W / 2;
  const targetY = player.y + player.h / 2 - H / 2;
  camera.x += (targetX - camera.x) * 0.1;
  camera.y += (targetY - camera.y) * 0.08;
  // Clamp
  camera.x = Math.max(0, Math.min(level.cols * T - W, camera.x));
  camera.y = Math.max(0, Math.min(level.rows * T - H, camera.y));
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
const particles = [];

function spawnBurst(x, y, colors, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (1.5 + Math.random() * 2.5),
      vy: Math.sin(angle) * (1.5 + Math.random() * 2.5),
      life: 1.0,
      color: colors[Math.floor(Math.random() * colors.length)],
      r: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camera.x, p.y - camera.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
// ENEMIES
// ═══════════════════════════════════════════
let enemies = [];

function spawnEnemies() {
  enemies = [];
  if (currentLevel === 0) {
    enemies.push(patrolBot(8 * T, 17 * T - 24, 1 * T, 15 * T));
    enemies.push(patrolBot(25 * T, 17 * T - 24, 21 * T, 34 * T));
    enemies.push(patrolBot(45 * T, 17 * T - 24, 40 * T, 56 * T));
    enemies.push(patrolBot(66 * T, 17 * T - 24, 62 * T, 79 * T));
  } else if (currentLevel === 1) {
    enemies.push(patrolBot(5 * T, 17 * T - 24, 0 * T, 11 * T));
    enemies.push(patrolBot(20 * T, 17 * T - 24, 16 * T, 29 * T));
    enemies.push(patrolBot(40 * T, 17 * T - 24, 33 * T, 52 * T));
    enemies.push(patrolBot(62 * T, 17 * T - 24, 58 * T, 71 * T));
    enemies.push(patrolBot(78 * T, 17 * T - 24, 74 * T, 89 * T));
  } else if (currentLevel === 2) {
    enemies.push(patrolBot(4 * T, 17 * T - 24, 0 * T, 9 * T));
    enemies.push(patrolBot(18 * T, 17 * T - 24, 15 * T, 22 * T));
    enemies.push(patrolBot(35 * T, 17 * T - 24, 28 * T, 42 * T));
    enemies.push(patrolBot(55 * T, 17 * T - 24, 51 * T, 65 * T));
    enemies.push(patrolBot(74 * T, 17 * T - 24, 72 * T, 79 * T));
    enemies.push(patrolBot(88 * T, 17 * T - 24, 82 * T, 99 * T));
  }
}

function patrolBot(x, y, minX, maxX) {
  return {
    x, y, w: 28, h: 24,
    vx: 1, minX, maxX,
    alive: true,
    type: 'patrol',
    frame: 0,
  };
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.frame++;
    e.x += e.vx;

    // Ground check: tile directly below enemy centre
    const belowTileCol = Math.floor((e.x + e.w / 2) / T);
    const belowTileRow = Math.floor((e.y + e.h + 2) / T);
    const onGround = getTile(belowTileRow, belowTileCol) === SOLID;

    // Wall check: scan the column the leading edge just entered,
    // from sky (row 0) down to the enemy's bottom row.
    // This catches both body-height tiles AND raised structures above.
    const botRow = Math.floor((e.y + e.h - 1) / T);
    const leadingCol = e.vx > 0
      ? Math.floor((e.x + e.w) / T)
      : Math.floor(e.x / T);
    let hitWall = false;
    for (let r = 0; r <= botRow; r++) {
      if (getTile(r, leadingCol) === SOLID) { hitWall = true; break; }
    }

    const prevVx = e.vx;

    if (e.x <= e.minX || e.x + e.w >= e.maxX || !onGround) {
      // Patrol bound / ground edge: nudge and flip
      e.vx *= -1;
      e.x += e.vx * 2;
    } else if (hitWall) {
      // Tile wall: snap flush to the wall boundary, then flip
      if (prevVx > 0) {
        e.x = leadingCol * T - e.w;   // right edge touches wall left face
      } else {
        e.x = (leadingCol + 1) * T;   // left edge touches wall right face
      }
      e.vx *= -1;
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const sx = e.x - camera.x;
    const sy = e.y - camera.y;

    // Draw a little patrol bot — orange body with legs
    const bob = Math.sin(e.frame * 0.15) * 2;

    // Body
    ctx.fillStyle = '#e65100';
    ctx.beginPath();
    ctx.roundRect(sx + 2, sy + 4 + bob, 24, 14, 4);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx + 10, sy + 9 + bob, 3, 0, Math.PI * 2);
    ctx.arc(sx + 20, sy + 9 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d32f2f';
    ctx.beginPath();
    ctx.arc(sx + 10 + (e.vx > 0 ? 1 : -1), sy + 9 + bob, 1.5, 0, Math.PI * 2);
    ctx.arc(sx + 20 + (e.vx > 0 ? 1 : -1), sy + 9 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.fillStyle = '#bf360c';
    const legOffset = Math.sin(e.frame * 0.2) * 3;
    ctx.fillRect(sx + 5, sy + 17 + bob, 4, 6 - legOffset);
    ctx.fillRect(sx + 19, sy + 17 + bob, 4, 6 + legOffset);

    // Antenna
    ctx.strokeStyle = '#ff6f00';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx + 14, sy + 4 + bob);
    ctx.lineTo(sx + 14, sy - 3 + bob);
    ctx.stroke();
    ctx.fillStyle = '#ff3d00';
    ctx.beginPath();
    ctx.arc(sx + 14, sy - 4 + bob, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════
// MOVING PLATFORMS
// ═══════════════════════════════════════════
let movingPlatforms = [];

function spawnMovingPlatforms() {
  movingPlatforms = [];
  if (currentLevel === 0) {
    movingPlatforms.push(movPlat(19 * T, 15 * T, 19 * T, 15 * T, 20 * T, 10 * T, 0.015));
    movingPlatforms.push(movPlat(55 * T, 16 * T, 55 * T, 16 * T, 59 * T, 16 * T, 0.012));
  } else if (currentLevel === 1) {
    movingPlatforms.push(movPlat(46 * T, 14 * T, 43 * T, 14 * T, 51 * T, 14 * T, 0.01));
    movingPlatforms.push(movPlat(72 * T, 16 * T, 72 * T, 16 * T, 74 * T, 12 * T, 0.012));
  } else if (currentLevel === 2) {
    movingPlatforms.push(movPlat(46 * T, 13 * T, 43 * T, 13 * T, 51 * T, 13 * T, 0.01));
    movingPlatforms.push(movPlat(80 * T, 16 * T, 80 * T, 16 * T, 82 * T, 10 * T, 0.01));
    movingPlatforms.push(movPlat(64 * T, 14 * T, 62 * T, 14 * T, 68 * T, 14 * T, 0.012));
  }
}

function movPlat(x, y, x1, y1, x2, y2, speed) {
  return { x, y, w: T * 3, h: 10, x1, y1, x2, y2, speed, t: 0, prevX: x, prevY: y };
}

function updateMovingPlatforms() {
  for (const p of movingPlatforms) {
    p.prevX = p.x;
    p.prevY = p.y;
    p.t += p.speed;
    const s = (Math.sin(p.t) + 1) / 2;
    p.x = p.x1 + (p.x2 - p.x1) * s;
    p.y = p.y1 + (p.y2 - p.y1) * s;
  }
}

function drawMovingPlatforms() {
  for (const p of movingPlatforms) {
    const sx = p.x - camera.x;
    const sy = p.y - camera.y;
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.roundRect(sx, sy, p.w, p.h, 3);
    ctx.fill();
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(sx + 4, sy + 2, p.w - 8, 2);
    ctx.fillRect(sx + 4, sy + 6, p.w - 8, 2);
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(sx, sy, p.w, p.h, 3);
    ctx.stroke();
  }
}

const player = {
  x: 50, y: 0, w: 36, h: 50,
  vx: 0, vy: 0,
  grounded: false,
  jumpsLeft: 2,
  facing: 1,
  maxSpeed: 1.5,
  accel: 0.22,
  friction: 0.78,
  gravity: 0.38,
  jumpForce: -13,
  djumpForce: -11,
  hp: 3,
  maxHp: 3,
  invincible: 0,
  dead: false,
  onMovingPlatform: null,
};

function resetPlayer() {

  player.y = 14 * T;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
  player.jumpsLeft = 2;
  player.facing = 1;
  player.hp = player.maxHp;
  player.invincible = 0;
  player.dead = false;
  player.onMovingPlatform = null;
}

function hurtPlayer() {
  if (player.invincible > 0 || player.dead) return;
  player.hp--;
  player.invincible = 90; // ~1.5 seconds
  spawnBurst(player.x + player.w / 2, player.y + player.h / 2, ['#f44336', '#ff5252', '#fff'], 10);
  sfxHurt();

    killPlayer();
  }

function killPlayer() {
  player.dead = true;
  lives--;
  spawnBurst(player.x + player.w / 2, player.y + player.h / 2, ['#f44336', '#ff5252', '#ff8a80', '#fff'], 20);
  sfxDeath();
  if (lives <= 0) {
    setTimeout(() => { gameState = STATE.GAME_OVER; stopMusic(); }, 1000);
  } else {
    setTimeout(() => {
      resetPlayer();
      collected.clear();
      countLevelBolts();
    }, 1000);
  }
}

// ═══════════════════════════════════════════
// TILE HELPERS
// ═══════════════════════════════════════════
function getTile(row, col) {
  if (row < 0 || row >= level.rows || col < 0 || col >= level.cols) return EMPTY;
  return level.grid[row][col];
}

function isSolid(row, col) {
  const t = getTile(row, col);
  return t === SOLID;
}

// ═══════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════
function updatePlayer() {
  if (player.dead) return;

  if (player.invincible > 0) player.invincible--;

  // Horizontal movement
  if (keys.left)  { player.vx -= player.accel; player.facing = -1; }
  if (keys.right) { player.vx += player.accel; player.facing = 1; }
  if (!keys.left && !keys.right) {
    player.vx *= player.friction;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }
  player.vx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.vx));

  // Jump / double jump
  if (keys.jump && jumpReleased && player.jumpsLeft > 0) {
    if (player.jumpsLeft === 2) {
      player.vy = player.jumpForce;
      sfxJump();
    } else {
      player.vy = player.djumpForce;
      spawnBurst(player.x + player.w / 2, player.y + player.h, ['#4fc3f7', '#81d4fa', '#fff', '#b3e5fc'], 14);
      sfxDoubleJump();
    }
    player.jumpsLeft--;
    player.grounded = false;
    jumpReleased = false;
  }

  // Variable jump height: cap upward velocity on early release (one-time cut)
  if (!keys.jump && player.vy < -4) {
    player.vy = -4;
  }

  // Gravity
  player.vy += player.gravity;
  if (player.vy > 12) player.vy = 12; // terminal velocity

  // Moving platform carry
  player.onMovingPlatform = null;

  // Move X then resolve collisions
  player.x += player.vx;
  resolveHorizontal();

  // Move Y then resolve collisions
  player.y += player.vy;
  resolveVertical();

  // Moving platform check
  for (const mp of movingPlatforms) {
    if (player.vy >= 0 &&
        player.x + player.w > mp.x && player.x < mp.x + mp.w &&
        player.y + player.h >= mp.y && player.y + player.h <= mp.y + mp.h + 6) {
      player.y = mp.y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumpsLeft = 2;
      player.onMovingPlatform = mp;
      // Carry
      player.x += mp.x - mp.prevX;
      player.y += mp.y - mp.prevY;
    }
  }

  // World bounds — clamp to level edges
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > level.cols * T) { player.x = level.cols * T - player.w; player.vx = 0; }

  // Fell off map
  if (player.y > level.rows * T + 100) {
    killPlayer();
  }

  // Collectibles
  checkCollectibles();

  // Enemy collision
  checkEnemyCollision();

  // Spike check
  checkSpikes();
}

function resolveHorizontal() {
  const top = Math.floor(player.y / T);
  const bot = Math.floor((player.y + player.h - 1) / T);

  if (player.vx > 0) {
    const col = Math.floor((player.x + player.w) / T);
    for (let r = top; r <= bot; r++) {
      if (isSolid(r, col)) {
        player.x = col * T - player.w;
        player.vx = 0;
        break;
      }
    }
  } else if (player.vx < 0) {
    const col = Math.floor(player.x / T);
    for (let r = top; r <= bot; r++) {
      if (isSolid(r, col)) {
        player.x = (col + 1) * T;
        player.vx = 0;
        break;
      }
    }
  }
}

function resolveVertical() {
  player.grounded = false;

  if (player.vy > 0) {
    // Falling — use narrow center hitbox so player falls off ledges naturally
    // (only the center 12px of the player checks for ground)
    const margin = 12;
    const left = Math.floor((player.x + margin) / T);
    const right = Math.floor((player.x + player.w - 1 - margin) / T);
    const row = Math.floor((player.y + player.h) / T);
    for (let c = left; c <= right; c++) {
      const tile = getTile(row, c);
      if (tile === SOLID || tile === ONEWAY) {
        // For one-way, only collide if feet were above
        if (tile === ONEWAY) {
          const tileTop = row * T;
          if (player.y + player.h - player.vy > tileTop + 4) continue;
        }
        player.y = row * T - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumpsLeft = 2;
        break;
      }
    }
  } else if (player.vy < 0) {
    // Rising — full width for ceiling checks
    const left = Math.floor(player.x / T);
    const right = Math.floor((player.x + player.w - 1) / T);
    const row = Math.floor(player.y / T);
    for (let c = left; c <= right; c++) {
      if (isSolid(row, c)) {
        player.y = (row + 1) * T;
        player.vy = 0;
        break;
      }
    }
  }
}

function checkCollectibles() {
  const pcx = player.x + player.w / 2;
  const pcy = player.y + player.h / 2;

  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const tile = level.grid[r][c];
      if (tile !== BOLT && tile !== PCELL) continue;
      const key = r + ',' + c;
      if (collected.has(key)) continue;

      const tx = c * T + T / 2;
      const ty = r * T + T / 2;
      const dist = Math.hypot(pcx - tx, pcy - ty);

      if (dist < 24) {
        collected.add(key);
        if (tile === BOLT) {
          bolts++;
          spawnBurst(tx, ty, ['#ffd600', '#ffab00', '#fff9c4'], 8);
          sfxCollect();
        } else if (tile === PCELL) {
          spawnBurst(tx, ty, ['#00e676', '#69f0ae', '#b9f6ca', '#fff'], 20);
          levelTransitionTimer = 120;
          gameState = STATE.LEVEL_COMPLETE;
          sfxPowerCell();
        }
      }
    }
  }
}

function checkEnemyCollision() {
  for (const e of enemies) {
    if (!e.alive) continue;
    // AABB overlap
    if (player.x + player.w > e.x && player.x < e.x + e.w &&
        player.y + player.h > e.y && player.y < e.y + e.h) {
      // Stomp: player falling and feet near top of enemy
      if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 4) {
        e.alive = false;
        player.vy = -8;
        player.jumpsLeft = Math.max(player.jumpsLeft, 1);
        spawnBurst(e.x + e.w / 2, e.y + e.h / 2, ['#e65100', '#ff6d00', '#ffab40', '#fff'], 12);
        sfxStomp();
      } else {
        hurtPlayer();
      }
    }
  }
}

function checkSpikes() {
  const left = Math.floor(player.x / T);
  const right = Math.floor((player.x + player.w - 1) / T);
  const top = Math.floor(player.y / T);
  const bot = Math.floor((player.y + player.h - 1) / T);
  for (let r = top; r <= bot; r++) {
    for (let c = left; c <= right; c++) {
      if (getTile(r, c) === SPIKE) {
        killPlayer();
        return;
      }
    }
  }
}

// ═══════════════════════════════════════════
// DRAW R2-D2 (compact version)
// ═══════════════════════════════════════════
function drawR2D2(px, py, facing) {
  const x = px - camera.x;
  const y = py - camera.y;

  // Blink when invincible
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const pivot = x + player.w / 2;
  ctx.save();
  if (facing === -1) {
    ctx.translate(pivot * 2, 0);
    ctx.scale(-1, 1);
  }

  // Scale factor — original was 52x80, now we draw at ~36x50
  const s = 0.625;
  ctx.translate(x, y);
  ctx.scale(s, s);

  const TAU = Math.PI * 2;
  const ox = 0; // offset x in local coords
  const oy = 0;

  // ── REAR LEG ──
  ctx.fillStyle = '#b0bec5';
  ctx.beginPath(); ctx.roundRect(ox+3, oy+57, 13, 18, [4,4,6,6]); ctx.fill();
  ctx.strokeStyle = '#78909c'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(ox+3, oy+57, 13, 18, [4,4,6,6]); ctx.stroke();

// ═══════════════════════════════════════════
// DRAW LEVEL
// ═══════════════════════════════════════════
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a237e');
  grad.addColorStop(0.4, '#42a5f5');
  grad.addColorStop(0.7, '#81d4fa');
  grad.addColorStop(1, '#b3e5fc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Parallax clouds
  const cloudScroll = camera.x * 0.15;
  drawCloud(100 - cloudScroll % 900, 60, 1.2);
  drawCloud(350 - cloudScroll % 900, 100, 0.8);
  drawCloud(600 - cloudScroll % 900, 40, 1.0);
  drawCloud(850 - cloudScroll % 900, 120, 0.6);
  drawCloud(200 - (cloudScroll * 0.6) % 900, 150, 0.9);
  drawCloud(500 - (cloudScroll * 0.6) % 900, 180, 0.7);
}

function drawCloud(x, y, scale) {
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.arc(x, y, 20 * scale, 0, Math.PI * 2);
  ctx.arc(x + 25 * scale, y - 8 * scale, 25 * scale, 0, Math.PI * 2);
  ctx.arc(x + 50 * scale, y, 18 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawTiles() {
  const startCol = Math.max(0, Math.floor(camera.x / T));
  const endCol = Math.min(level.cols - 1, Math.floor((camera.x + W) / T) + 1);
  const startRow = Math.max(0, Math.floor(camera.y / T));
  const endRow = Math.min(level.rows - 1, Math.floor((camera.y + H) / T) + 1);

  const time = Date.now() * 0.003;

  for (let r = startRow; r <= endRow; r++) {
    for (let c = startCol; c <= endCol; c++) {
      const tile = level.grid[r][c];
      if (tile === EMPTY) continue;

      const key = r + ',' + c;
      if ((tile === BOLT || tile === PCELL) && collected.has(key)) continue;

      const sx = c * T - camera.x;
      const sy = r * T - camera.y;

      switch (tile) {
        case SOLID:
          drawSolidTile(sx, sy, r, c);
          break;
        case ONEWAY:
          drawOneWayTile(sx, sy);
          break;
        case SPIKE:
          drawSpikeTile(sx, sy);
          break;
        case BOLT:
          drawBolt(sx, sy, time);
          break;
        case PCELL:
          drawPowerCell(sx, sy, time);
          break;
      }
    }
  }
}

function drawSolidTile(sx, sy, r, c) {
  // Check if top is exposed (no solid above)
  const above = getTile(r - 1, c);
  if (above !== SOLID) {
    // Grass top
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(sx, sy, T, 6);
    ctx.fillStyle = '#66bb6a';
    ctx.fillRect(sx, sy, T, 3);
    // Dirt below
    ctx.fillStyle = '#795548';
    ctx.fillRect(sx, sy + 6, T, T - 6);
    // Dirt texture
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(sx + 4, sy + 12, 3, 3);
    ctx.fillRect(sx + 18, sy + 20, 4, 2);
    ctx.fillRect(sx + 10, sy + 16, 2, 4);
  } else {
    // Underground
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(sx, sy, T, T);
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(sx + 2, sy + 2, T - 4, T - 4);
    // Texture dots
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(sx + 6, sy + 8, 2, 2);
    ctx.fillRect(sx + 20, sy + 18, 3, 2);
  }
  // Grid line
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(sx, sy, T, T);
}

function drawOneWayTile(sx, sy) {
  ctx.fillStyle = '#8d6e63';
  ctx.beginPath();
  ctx.roundRect(sx, sy, T, 8, 2);
  ctx.fill();
  ctx.fillStyle = '#6d4c41';
  ctx.fillRect(sx + 4, sy + 2, T - 8, 3);
  ctx.strokeStyle = '#4e342e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(sx, sy, T, 8, 2);
  ctx.stroke();
}

function drawSpikeTile(sx, sy) {
  ctx.fillStyle = '#d32f2f';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(sx + i * 8, sy + T);
    ctx.lineTo(sx + i * 8 + 4, sy + 6);
    ctx.lineTo(sx + i * 8 + 8, sy + T);
    ctx.fill();
  }
  ctx.fillStyle = '#f44336';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(sx + i * 8 + 1, sy + T);
    ctx.lineTo(sx + i * 8 + 4, sy + 10);
    ctx.lineTo(sx + i * 8 + 7, sy + T);
    ctx.fill();
  }
}

function drawBolt(sx, sy, time) {
  const bob = Math.sin(time + sx * 0.1) * 3;
  const cx = sx + T / 2;
  const cy = sy + T / 2 + bob;

  // Glow
  ctx.fillStyle = 'rgba(255,214,0,0.3)';
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fill();

  // Bolt shape (hexagon)
  ctx.fillStyle = '#ffd600';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI * 2 / 6) * i - Math.PI / 2;
    const r = 7;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.fill();
  ctx.fillStyle = '#ffab00';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI * 2 / 6) * i - Math.PI / 2;
    const r = 4;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.fill();
}

function drawPowerCell(sx, sy, time) {
  const bob = Math.sin(time * 2) * 5;
  const cx = sx + T / 2;
  const cy = sy + T / 2 + bob;
  const pulse = Math.sin(time * 3) * 0.3 + 0.7;

  // Glow
  ctx.fillStyle = `rgba(0,230,118,${0.2 * pulse})`;
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, Math.PI * 2);
  ctx.fill();

  // Outer ring
  ctx.strokeStyle = '#00e676';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.stroke();

  // Inner diamond
  ctx.fillStyle = '#69f0ae';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 8);
  ctx.lineTo(cx + 6, cy);
  ctx.lineTo(cx, cy + 8);
  ctx.lineTo(cx - 6, cy);
  ctx.closePath();
  ctx.fill();

  // Core
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();
}

// HUD
// ═══════════════════════════════════════════
function drawHUD() {
  // Health
  for (let i = 0; i < player.maxHp; i++) {
    const hx = 16 + i * 28;
    if (i < player.hp) {
      ctx.fillStyle = '#42a5f5';
      ctx.strokeStyle = '#1e88e5';
    } else {
      ctx.fillStyle = '#37474f';
      ctx.strokeStyle = '#263238';
    }
    ctx.lineWidth = 1.5;
    // Shield icon
    ctx.beginPath();
    ctx.moveTo(hx + 10, hx === 16 ? 14 : 14);
    ctx.moveTo(hx + 10, 14);
    ctx.lineTo(hx + 20, 18);
    ctx.lineTo(hx + 20, 28);
    ctx.quadraticCurveTo(hx + 10, 36, hx + 10, 36);
    ctx.quadraticCurveTo(hx + 0, 36, hx + 0, 28);
    ctx.lineTo(hx + 0, 18);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Bolts
  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(`x${bolts}`, 110, 30);

  // Bolt icon
  ctx.fillStyle = '#ffd600';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI * 2 / 6) * i - Math.PI / 2;
    const r = 6;
    if (i === 0) ctx.moveTo(100 + Math.cos(a) * r, 25 + Math.sin(a) * r);
    else ctx.lineTo(100 + Math.cos(a) * r, 25 + Math.sin(a) * r);
  }
  ctx.fill();

  // Lives
  ctx.fillStyle = '#ef5350';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`Lives: ${lives}`, W - 100, 28);

  // Level name
  const names = ['Cloud Meadow', 'Vine Ruins', 'Mech Tower'];
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '12px monospace';
  ctx.fillText(`Level ${currentLevel + 1}: ${names[currentLevel] || ''}`, W / 2 - 60, 20);
}

function drawControls() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(8, H - 32, 380, 24);
  ctx.fillStyle = '#ddd';
  ctx.font = '11px monospace';
  ctx.fillText('Arrow/WASD move   Space/Z/W/Up jump (double jump!)', 16, H - 15);
}

function drawJumpIndicator() {
  if (player.grounded || player.dead) return;
  const dotY = player.y - 10 - camera.y;
  const dotX = player.x + player.w / 2 - camera.x;
  for (let i = 0; i < player.jumpsLeft; i++) {
    ctx.fillStyle = '#4fc3f7';
    ctx.beginPath();
    ctx.arc(dotX - 5 + i * 10, dotY, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

  for (let i = 0; i < 20; i++) {

// ═══════════════════════════════════════════
// LEVEL MANAGEMENT
// ═══════════════════════════════════════════
function loadLevel(idx) {
  currentLevel = idx;
  level = LEVELS[idx];
  collected.clear();
  resetPlayer();
  camera.x = 0;
  camera.y = 0;
  particles.length = 0;
  spawnEnemies();
  spawnMovingPlatforms();
  countLevelBolts();
}

function countLevelBolts() {
  totalBolts = 0;
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      if (level.grid[r][c] === BOLT) totalBolts++;
    }
  }
}

function startGame() {
  initAudio();
  sfxMenuSelect();
  bolts = 0;
  lives = 3;
  loadLevel(0);
  gameState = STATE.PLAYING;
  startMusic();
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
let lastTime = 0;
let enterWasDown = false;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 3);
  lastTime = timestamp;

  const enterPressed = keys.enter && !enterWasDown;
  enterWasDown = keys.enter;

  switch (gameState) {
    case STATE.MENU:
      drawMenuScreen();
      if (enterPressed) startGame();
      break;

    case STATE.PLAYING:
      updatePlayer();
      updateEnemies();
      updateMovingPlatforms();
      updateParticles();
      updateCamera();

      drawBackground();
      drawTiles();
      drawMovingPlatforms();
      drawEnemies();
      if (!player.dead) {
        drawR2D2(player.x, player.y, player.facing);
        drawJumpIndicator();
      }
      drawParticles();
      drawHUD();
      drawControls();
      break;

    case STATE.LEVEL_COMPLETE:
      // Keep drawing the level behind the overlay
      drawBackground();
      drawTiles();
      drawMovingPlatforms();
      drawEnemies();
      drawParticles();
      updateParticles();
      drawLevelComplete();

      if (levelTransitionTimer > 0) {
        levelTransitionTimer--;
      } else if (enterPressed) {
        if (currentLevel + 1 < LEVELS.length) {
          loadLevel(currentLevel + 1);
          gameState = STATE.PLAYING;
        } else {
          gameState = STATE.WIN;
          stopMusic();
        }
      }
      break;

    case STATE.GAME_OVER:
      drawGameOver();
      if (enterPressed) {
        sfxMenuSelect();
        gameState = STATE.MENU;
      }
      break;

    case STATE.WIN:
      drawWinScreen();
      if (enterPressed) {
        sfxMenuSelect();
        gameState = STATE.MENU;
      }
      break;
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
